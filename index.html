<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GarçomPro Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

header h1{
font-size:28px;
font-weight:700;
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab-btn{
padding:14px 20px;
border:none;
border-radius:14px;
background:#1e293b;
color:#fff;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.tab-btn.active{
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:22px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:20px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:8px;
}

input,
textarea{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#334155;
color:white;
}

textarea{
resize:none;
height:80px;
}

button{
border:none;
padding:14px;
border-radius:14px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

.btn-primary{
width:100%;
background:linear-gradient(135deg,#8b5cf6,#2563eb);
color:white;
margin-top:10px;
}

.btn-add{
flex:1;
background:#2563eb;
color:white;
}

.btn-remove{
background:#dc2626;
color:white;
}

.btn-cliente{
width:100%;
background:#16a34a;
color:white;
margin-top:10px;
}

.btn-entregue{
background:#16a34a;
color:white;
width:100%;
margin-top:15px;
}

.btn-print{
background:#2563eb;
color:white;
width:100%;
margin-top:10px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.item-card{
background:#111827;
border-radius:20px;
overflow:hidden;
}

.item-card img{
width:100%;
height:180px;
object-fit:cover;
}

.item-content{
padding:15px;
}

.price{
color:#4ade80;
font-weight:700;
margin:10px 0;
}

.desc{
color:#cbd5e1;
margin-bottom:15px;
font-size:14px;
}

.actions{
display:flex;
gap:10px;
}

.order-item{
background:#334155;
padding:12px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

.total{
font-size:24px;
font-weight:700;
margin-top:20px;
text-align:right;
color:#4ade80;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.qr-card{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
}

.qrcode{
background:white;
padding:10px;
border-radius:12px;
display:inline-block;
margin-top:10px;
}

.admin-pedido{
background:#111827;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}

.status{
padding:6px 12px;
border-radius:10px;
display:inline-block;
font-size:13px;
margin-top:10px;
font-weight:700;
}

.pendente{
background:#dc2626;
}

.entregue{
background:#16a34a;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<header>
<h1>🍽️ GarçomPro Firebase</h1>
</header>

<div class="container">

<div class="tabs">

<button class="tab-btn active"
onclick="abrirAba('garcom', this)">
🍽️ Garçom
</button>

<button class="tab-btn"
onclick="abrirAba('admin', this)">
⚙️ Admin
</button>

<button class="tab-btn"
onclick="abrirAba('cliente', this)">
📱 Cliente
</button>

<button class="tab-btn"
onclick="abrirAba('qr', this)">
🔳 QR Code
</button>

</div>

<!-- GARÇOM -->

<div id="garcom" class="tab-content active">

<div class="grid">

<div class="card">

<h2>🧾 Pedido Atual</h2>

<div class="form-group">
<label>Número da Mesa</label>
<input type="number" id="mesa">
</div>

<div id="pedido"></div>

<div class="total" id="total">
Total: R$ 0,00
</div>

<button class="btn-primary"
onclick="baixarNotaFiscal()">
🧾 Imprimir Nota Fiscal
</button>

</div>

<div class="card">

<h2>📋 Cardápio</h2>

<div class="menu-grid"
id="menuGrid"></div>

</div>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="tab-content">

<div class="grid">

<div>

<div class="card">

<h2>⚙️ Painel Administrativo</h2>

<div class="form-group">
<label>Nome</label>
<input type="text" id="nome">
</div>

<div class="form-group">
<label>Preço</label>
<input type="number" id="preco">
</div>

<div class="form-group">
<label>Descrição</label>
<textarea id="descricao"></textarea>
</div>

<div class="form-group">
<label>Foto</label>
<input type="file"
id="imagem"
accept="image/*">
</div>

<button class="btn-primary"
onclick="adicionarItem()">
➕ Adicionar Produto
</button>

</div>

</div>

<div>

<div class="card">

<h2>📦 Pedidos Recebidos</h2>

<div id="listaPedidosAdmin"></div>

</div>

</div>

</div>

</div>

<!-- CLIENTE -->

<div id="cliente" class="tab-content">

<div class="card">

<h2>📱 Cardápio Digital</h2>

<div
id="mesaClienteInfo"
style="
margin-bottom:20px;
background:#334155;
padding:15px;
border-radius:14px;
font-weight:600;
text-align:center;
">
</div>

<div class="menu-grid"
id="clienteMenu"></div>

<h2 style="margin-top:30px;">
🛒 Meu Pedido
</h2>

<div id="pedidoCliente"></div>

<div
class="total"
id="totalCliente">
Total: R$ 0,00
</div>

<button
class="btn-primary"
onclick="enviarPedidoCliente()">
📤 Enviar Pedido
</button>

</div>

</div>

<!-- QR -->

<div id="qr" class="tab-content">

<div class="card">

<h2>🔳 QR Code das Mesas</h2>

<div class="form-group">
<label>Quantidade de Mesas</label>
<input type="number"
id="quantidadeMesas">
</div>

<button class="btn-primary"
onclick="gerarQRCodes()">
🔳 Gerar QR Codes
</button>

<div class="qr-grid"
id="qrGrid"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "SUA_API_KEY",
authDomain: "SEU_DOMINIO.firebaseapp.com",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_SENDER_ID",
appId: "SEU_APP_ID"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const { jsPDF } = window.jspdf;

let cardapio = [];
let pedido = [];
let pedidoCliente = [];

/* ABAS */

window.abrirAba = function(id, botao){

document.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document.querySelectorAll(".tab-btn")
.forEach(btn=>{
btn.classList.remove("active");
});

document.getElementById(id)
.classList.add("active");

botao.classList.add("active");

}

/* CARREGAR PRODUTOS */

async function carregarProdutos(){

const querySnapshot =
await getDocs(collection(db, "produtos"));

cardapio = [];

querySnapshot.forEach((docItem)=>{

cardapio.push({
firebaseId: docItem.id,
...docItem.data()
});

});

renderizarCardapio();
renderizarCliente();

}

/* ADICIONAR PRODUTO */

window.adicionarItem = async function(){

const nome =
document.getElementById("nome").value;

const preco =
document.getElementById("preco").value;

const descricao =
document.getElementById("descricao").value;

const imagemInput =
document.getElementById("imagem");

if(!nome || !preco){

alert("Preencha os campos!");
return;

}

const arquivo =
imagemInput.files[0];

if(arquivo){

const reader =
new FileReader();

reader.onload =
async function(e){

const produto = {

nome,
preco:parseFloat(preco),
descricao,
imagem:e.target.result

};

await addDoc(
collection(db, "produtos"),
produto
);

alert("Produto salvo!");

limparFormulario();

carregarProdutos();

};

reader.readAsDataURL(arquivo);

}

}

/* LIMPAR */

function limparFormulario(){

document.getElementById("nome").value = "";
document.getElementById("preco").value = "";
document.getElementById("descricao").value = "";
document.getElementById("imagem").value = "";

}

/* CARDÁPIO */

function renderizarCardapio(){

const menuGrid =
document.getElementById("menuGrid");

menuGrid.innerHTML = "";

cardapio.forEach(item=>{

menuGrid.innerHTML += `

<div class="item-card">

<img src="${item.imagem}">

<div class="item-content">

<h3>${item.nome}</h3>

<div class="price">
R$ ${item.preco.toFixed(2)}
</div>

<div class="desc">
${item.descricao}
</div>

<div class="actions">

<button class="btn-add"
onclick="adicionarPedido('${item.firebaseId}')">
Adicionar
</button>

<button class="btn-remove"
onclick="removerProduto('${item.firebaseId}')">
✕
</button>

</div>

</div>

</div>

`;

});

renderizarCliente();

}

/* CLIENTE */

function renderizarCliente(){

const clienteMenu =
document.getElementById("clienteMenu");

clienteMenu.innerHTML = "";

cardapio.forEach(item=>{

clienteMenu.innerHTML += `

<div class="item-card">

<img src="${item.imagem}">

<div class="item-content">

<h3>${item.nome}</h3>

<div class="price">
R$ ${item.preco.toFixed(2)}
</div>

<div class="desc">
${item.descricao}
</div>

<button
class="btn-cliente"
onclick="adicionarPedidoCliente('${item.firebaseId}')">
Adicionar ao Pedido
</button>

</div>

</div>

`;

});

}

/* REMOVER PRODUTO */

window.removerProduto = async function(id){

if(confirm("Deseja remover este produto?")){

await deleteDoc(
doc(db, "produtos", id)
);

carregarProdutos();

}

}

/* PEDIDO CLIENTE */

window.adicionarPedidoCliente = function(id){

const item =
cardapio.find(i=>i.firebaseId === id);

const existente =
pedidoCliente.find(i=>i.firebaseId === id);

if(existente){

existente.quantidade += 1;

}else{

pedidoCliente.push({
...item,
quantidade:1
});

}

renderizarPedidoCliente();

}

window.aumentarQuantidade = function(index){

pedidoCliente[index].quantidade += 1;

renderizarPedidoCliente();

}

window.diminuirQuantidade = function(index){

if(pedidoCliente[index].quantidade > 1){

pedidoCliente[index].quantidade -= 1;

}else{

pedidoCliente.splice(index,1);

}

renderizarPedidoCliente();

}

window.removerItemCliente = function(index){

pedidoCliente.splice(index,1);

renderizarPedidoCliente();

}

function renderizarPedidoCliente(){

const pedidoDiv =
document.getElementById("pedidoCliente");

pedidoDiv.innerHTML = "";

let total = 0;

pedidoCliente.forEach((item,index)=>{

const subtotal =
item.preco * item.quantidade;

total += subtotal;

pedidoDiv.innerHTML += `

<div class="order-item"
style="
flex-direction:column;
align-items:flex-start;
gap:10px;
">

<div style="
width:100%;
display:flex;
justify-content:space-between;
">

<div>
${item.nome}
</div>

<div>
R$ ${subtotal.toFixed(2)}
</div>

</div>

<div style="
display:flex;
gap:10px;
width:100%;
">

<button
class="btn-remove"
style="width:50px;"
onclick="diminuirQuantidade(${index})">
-
</button>

<div style="
flex:1;
background:#1e293b;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
">
${item.quantidade}
</div>

<button
class="btn-add"
onclick="aumentarQuantidade(${index})">
+
</button>

<button
class="btn-remove"
onclick="removerItemCliente(${index})">
🗑️
</button>

</div>

</div>

`;

});

document.getElementById("totalCliente")
.innerHTML =
"Total: R$ " + total.toFixed(2);

}

/* ENVIAR PEDIDO */

window.enviarPedidoCliente = async function(){

if(pedidoCliente.length === 0){

alert("Adicione itens!");
return;

}

const params =
new URLSearchParams(window.location.search);

const mesa =
params.get("mesa") || "Sem Mesa";

let total = 0;

pedidoCliente.forEach(item=>{

total += item.preco * item.quantidade;

});

await addDoc(
collection(db, "pedidos"),
{
mesa,
itens:pedidoCliente,
total,
status:"pendente",
data:new Date().toLocaleString()
}
);

alert("Pedido enviado para cozinha!");

pedidoCliente = [];

renderizarPedidoCliente();

}

/* PEDIDOS ADMIN */

function carregarPedidosAdmin(){

const pedidosRef =
collection(db, "pedidos");

onSnapshot(pedidosRef, (snapshot)=>{

const lista =
document.getElementById("listaPedidosAdmin");

lista.innerHTML = "";

snapshot.forEach((docItem)=>{

const pedido = docItem.data();

let itensHTML = "";

pedido.itens.forEach(item=>{

const subtotal =
item.preco * item.quantidade;

itensHTML += `
<div class="order-item">
<div>
${item.nome} x${item.quantidade}
</div>
<div>
R$ ${subtotal.toFixed(2)}
</div>
</div>
`;

});

lista.innerHTML += `

<div class="admin-pedido">

<h3>
🍽️ Mesa ${pedido.mesa}
</h3>

${itensHTML}

<div class="total">
R$ ${pedido.total.toFixed(2)}
</div>

<div class="status ${pedido.status}">
${pedido.status.toUpperCase()}
</div>

${
pedido.status === "pendente"
?
`
<button
class="btn-entregue"
onclick="marcarEntregue('${docItem.id}')">
✅ Marcar Entregue
</button>
`
:
`
<button
class="btn-primary"
style="
background:#f59e0b;
margin-top:15px;
"
onclick="marcarPendente('${docItem.id}')">
↩️ Voltar para Pendente
</button>

<button
class="btn-remove"
style="
width:100%;
margin-top:10px;
"
onclick="apagarPedido('${docItem.id}')">
🗑️ Excluir Pedido
</button>
`
}

</div>

`;

});

});

}

/* STATUS */

window.marcarEntregue = async function(id){

await updateDoc(
doc(db, "pedidos", id),
{
status:"entregue"
}
);

}

window.marcarPendente = async function(id){

await updateDoc(
doc(db, "pedidos", id),
{
status:"pendente"
}
);

}

/* EXCLUIR PEDIDO */

window.apagarPedido = async function(id){

const confirmar =
confirm("Deseja excluir este pedido?");

if(!confirmar){
return;
}

await deleteDoc(
doc(db, "pedidos", id)
);

alert("Pedido excluído!");

}

/* QR CODE */

window.gerarQRCodes = function(){

const quantidade =
parseInt(
document.getElementById("quantidadeMesas").value
);

const qrGrid =
document.getElementById("qrGrid");

qrGrid.innerHTML = "";

const cardapioURL =
window.location.origin +
window.location.pathname +
"?cliente=true";

for(let i=1;i<=quantidade;i++){

const qrId = "qrMesa"+i;

qrGrid.innerHTML += `

<div class="qr-card"
id="cardMesa${i}">

<h3>
🍽️ Mesa ${i}
</h3>

<div
id="${qrId}"
class="qrcode">
</div>

<p style="margin-top:10px;">
Escaneie para abrir o cardápio
</p>

<button
class="btn-print"
onclick="imprimirQRCode(${i})">
🖨️ Imprimir QR Code
</button>

</div>

`;

new QRCode(
document.getElementById(qrId),
{
text: cardapioURL + "&mesa=" + i,
width:180,
height:180
}
);

}

}

/* IMPRIMIR QR */

window.imprimirQRCode = function(mesa){

const qrCanvas =
document.querySelector(
"#qrMesa" + mesa + " canvas"
);

if(!qrCanvas){

alert("QR Code não encontrado!");
return;

}

const qrBase64 =
qrCanvas.toDataURL("image/png");

const janela =
window.open("", "_blank", "width=500,height=700");

janela.document.write(`

<html>

<head>

<title>QR Mesa ${mesa}</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:40px;
}

img{
width:260px;
height:260px;
margin-top:20px;
}

h1{
margin-bottom:10px;
}

p{
font-size:18px;
margin-top:20px;
}

button{
margin-top:30px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

@media print{

button{
display:none;
}

body{
padding-top:80px;
}

}

</style>

</head>

<body>

<h1>🍽️ Mesa ${mesa}</h1>

<img src="${qrBase64}">

<p>
Escaneie para abrir o cardápio
</p>

<button onclick="window.print()">
🖨️ Imprimir
</button>

</body>

</html>

`);

janela.document.close();

}

/* INICIAR */

carregarProdutos();
carregarPedidosAdmin();

/* MODO CLIENTE */

const params =
new URLSearchParams(window.location.search);

const modoCliente =
params.get("cliente");

const mesaURL =
params.get("mesa");

if(mesaURL){

document.getElementById(
"mesaClienteInfo"
).innerHTML =
"🍽️ Você está na Mesa " + mesaURL;

}

if(modoCliente === "true"){

document.querySelector(".tabs")
.style.display = "none";

document.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document.getElementById("cliente")
.classList.add("active");

document.querySelector("header h1")
.innerHTML =
"📱 Cardápio Digital";

document.body.style.background =
"#111827";

}

</script>

</body>
</html>
