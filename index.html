<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GarçomPro Firebase</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#fff;
padding:20px;
}

header{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:20px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input,button,select,textarea{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
}

button{
background:#2563eb;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
margin-top:20px;
}

.item-card{
background:#111827;
border-radius:20px;
overflow:hidden;
}

.item-card img{
width:100%;
height:180px;
object-fit:cover;
}

.item-content{
padding:15px;
}

.price{
color:#4ade80;
font-weight:bold;
margin:10px 0;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.qr-card{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
}

.qrcode{
background:#fff;
padding:10px;
display:inline-block;
border-radius:12px;
margin-top:10px;
}

.statusLivre{
color:#4ade80;
font-weight:bold;
margin-top:10px;
}

.statusOcupada{
color:#ef4444;
font-weight:bold;
margin-top:10px;
}
</style>
</head>
<body>

<header>
<h1>🍽️ GarçomPro Firebase</h1>
</header>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
<button onclick="abrirAba('admin')">⚙️ Admin</button>
<button onclick="abrirAba('garcom')">🍽️ Garçom</button>
<button onclick="abrirAba('cliente')">📱 Cliente</button>
<button onclick="abrirAba('qr')">🔳 QR Codes</button>
</div>

<div id="admin" class="aba">
<div class="card">
<h2>➕ Adicionar Produto</h2>
<input type="text" id="nome" placeholder="Nome do produto">
<input type="number" id="preco" placeholder="Preço">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input type="file" id="imagem" accept="image/*">
<button onclick="adicionarProduto()">Salvar Produto</button>
</div>

</div>

<div id="garcom" class="aba" style="display:none;">
<div class="card">
<h2>📱 Cardápio</h2>
<div class="menu-grid" id="menu"></div>
</div>

</div>

<div id="cliente" class="aba" style="display:none;">
<div class="card">
<h2>📱 Área do Cliente</h2>
<p>O cliente verá apenas o cardápio digital ao acessar pelo QR Code.</p>
</div>
</div>

<div id="qr" class="aba" style="display:none;">
<div class="card">
<h2>🔳 QR Codes das Mesas</h2>
<input type="number" id="quantidadeMesas" placeholder="Quantidade de mesas">
<button onclick="gerarMesas()">Gerar QR Codes</button>
<div class="qr-grid" id="qrGrid"></div>
</div>

<script type="module">

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
setDoc,
onSnapshot
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
apiKey:'AIzaSyBsam8XGNicS8vlpehCVlI-8_JBKyk_v2M',
authDomain:'garcompro-bd3b3.firebaseapp.com',
projectId:'garcompro-bd3b3',
storageBucket:'garcompro-bd3b3.firebasestorage.app',
messagingSenderId:'311775314838',
appId:'1:311775314838:web:b4cafc21f9b8850811d3b7'
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let produtos = [];

window.adicionarProduto = async function(){

try{

const nome = document.getElementById('nome').value;
const preco = document.getElementById('preco').value;
const descricao = document.getElementById('descricao').value;
const imagem = document.getElementById('imagem').files[0];

if(!nome || !preco || !imagem){
alert('Preencha todos os campos');
return;
}

const reader = new FileReader();

reader.onload = async function(e){

await addDoc(collection(db,'produtos'),{
nome,
preco:parseFloat(preco),
descricao,
imagem:e.target.result
});

alert('Produto salvo');
carregarProdutos();
};

reader.readAsDataURL(imagem);

}catch(erro){
console.log(erro);
alert('Erro ao salvar produto');
}
}

async function carregarProdutos(){

const menu = document.getElementById('menu');
menu.innerHTML = '';

const snapshot = await getDocs(collection(db,'produtos'));

snapshot.forEach((docItem)=>{

const item = docItem.data();

menu.innerHTML += `
<div class="item-card">
<img src="${item.imagem}">
<div class="item-content">
<h3>${item.nome}</h3>
<div class="price">R$ ${item.preco.toFixed(2)}</div>
<p>${item.descricao}</p>
</div>
</div>
`;

});
}

window.gerarMesas = async function(){

const quantidade = parseInt(document.getElementById('quantidadeMesas').value);

if(!quantidade){
alert('Digite a quantidade');
return;
}

const qrGrid = document.getElementById('qrGrid');

for(let i=1;i<=quantidade;i++){

const existente = document.getElementById('mesa'+i);

if(existente){
continue;
}

await setDoc(doc(db,'mesas','mesa'+i),{
status:'livre'
});

const div = document.createElement('div');
div.className = 'qr-card';
div.id = 'mesa'+i;

const qrId = 'qr'+i;

div.innerHTML = `
<h3>Mesa ${i}</h3>
<div class="qrcode" id="${qrId}"></div>
<p id="status${i}" class="statusLivre">🟢 Livre</p>
<button onclick="ocuparMesa(${i})">🔴 Ocupar</button>
<button onclick="liberarMesa(${i})">🟢 Liberar</button>
<button onclick="imprimirQR(${i})">🖨️ Imprimir</button>
`;

qrGrid.appendChild(div);

new QRCode(document.getElementById(qrId),{
text:window.location.origin + window.location.pathname + '?mesa='+i,
width:180,
height:180
});
}
}

window.ocuparMesa = async function(numero){

await setDoc(doc(db,'mesas','mesa'+numero),{
status:'ocupada'
});

document.getElementById('status'+numero).innerHTML = '🔴 Ocupada';
document.getElementById('status'+numero).className = 'statusOcupada';
}

window.liberarMesa = async function(numero){

await setDoc(doc(db,'mesas','mesa'+numero),{
status:'livre'
});

document.getElementById('status'+numero).innerHTML = '🟢 Livre';
document.getElementById('status'+numero).className = 'statusLivre';
}

window.abrirAba = function(id){

const abas = document.querySelectorAll('.aba');
abas.forEach(aba=>aba.style.display='none');

const abaAtual = document.getElementById(id);

if(abaAtual){
abaAtual.style.display='block';
}
}

window.imprimirQR = function(numero){

const canvas = document.querySelector('#qr'+numero+' canvas');

if(!canvas){
alert('QR não encontrado');
return;
}

const imagem = canvas.toDataURL('image/png');

const janela = window.open('','','width=500,height=600');

janela.document.write(`
<html>
<body style="font-family:Arial;text-align:center;padding:30px;">
<h1>Mesa ${numero}</h1>
<img src="${imagem}" style="width:250px;height:250px;">
<script>
window.print();
<\/script>
</body>
</html>
`);

janela.document.close();
}

const params = new URLSearchParams(window.location.search);
const modoCliente = params.get('cliente');

if(modoCliente === 'true'){

const abas = document.querySelectorAll('.aba');
abas.forEach(aba=>aba.style.display='none');

const cliente = document.getElementById('cliente');
cliente.style.display='block';

const botoes = document.querySelectorAll('button');

botoes.forEach(btn=>{
if(btn.innerText.includes('Admin') || btn.innerText.includes('Garçom') || btn.innerText.includes('QR')){
btn.style.display='none';
}
});

}else{
abrirAba('admin');
}

try{
carregarProdutos();
}catch(erro){
console.log(erro);
alert('Erro ao iniciar sistema');
}

</script>

</body>
</html>
