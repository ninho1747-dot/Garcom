<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GarçomPro Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

header h1{
font-size:28px;
font-weight:700;
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab-btn{
padding:14px 20px;
border:none;
border-radius:14px;
background:#1e293b;
color:#fff;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.tab-btn.active{
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:22px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:20px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:8px;
}

input,
textarea,
select{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#334155;
color:white;
}

textarea{
resize:none;
height:80px;
}

button{
border:none;
padding:14px;
border-radius:14px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

.btn-primary{
width:100%;
background:linear-gradient(135deg,#8b5cf6,#2563eb);
color:white;
margin-top:10px;
}

.btn-add{
background:#2563eb;
color:white;
}

.btn-remove{
background:#dc2626;
color:white;
}

.btn-cliente{
width:100%;
background:#16a34a;
color:white;
margin-top:10px;
}

.btn-entregue{
background:#16a34a;
color:white;
width:100%;
margin-top:15px;
}

.btn-print{
background:#2563eb;
color:white;
width:100%;
margin-top:10px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.item-card{
background:#111827;
border-radius:20px;
overflow:hidden;
}

.item-card img{
width:100%;
height:180px;
object-fit:cover;
}

.item-content{
padding:15px;
}

.price{
color:#4ade80;
font-weight:700;
margin:10px 0;
}

.desc{
color:#cbd5e1;
margin-bottom:15px;
font-size:14px;
}

.order-item{
background:#334155;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

.total{
font-size:24px;
font-weight:700;
margin-top:20px;
text-align:right;
color:#4ade80;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.qr-card{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
}

.qrcode{
background:white;
padding:10px;
border-radius:12px;
display:inline-block;
margin-top:10px;
}

.admin-pedido{
background:#111827;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}

.status{
padding:6px 12px;
border-radius:10px;
display:inline-block;
font-size:13px;
margin-top:10px;
font-weight:700;
}

.pendente{
background:#dc2626;
}

.entregue{
background:#16a34a;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<header>
<h1>🍽️ GarçomPro Firebase</h1>
</header>

<div class="container">

<div class="tabs">

<button class="tab-btn active"
onclick="abrirAba('admin', this)">
⚙️ Admin
</button>

<button class="tab-btn"
onclick="abrirAba('cliente', this)">
📱 Cliente
</button>

<button class="tab-btn"
onclick="abrirAba('qr', this)">
🔳 QR Code
</button>

</div>

<!-- ADMIN -->

<div id="admin" class="tab-content active">

<div class="grid">

<div>

<div class="card">

<h2>⚙️ Painel Administrativo</h2>

<div class="form-group">
<label>Nome</label>
<input type="text" id="nome">
</div>

<div class="form-group">
<label>Preço</label>
<input type="number" id="preco">
</div>

<div class="form-group">
<label>Descrição</label>
<textarea id="descricao"></textarea>
</div>

<div class="form-group">
<label>Foto</label>
<input type="file"
id="imagem"
accept="image/*">
</div>

<button class="btn-primary"
onclick="adicionarItem()">
➕ Adicionar Produto
</button>

</div>

</div>

<div>

<div class="card">

<h2>📦 Pedidos Recebidos</h2>

<div id="listaPedidosAdmin"></div>

</div>

</div>

</div>

</div>

<!-- CLIENTE -->

<div id="cliente" class="tab-content">

<div class="card">

<h2>📱 Cardápio Digital</h2>

<div
id="mesaClienteInfo"
style="
margin-bottom:20px;
background:#334155;
padding:15px;
border-radius:14px;
font-weight:600;
text-align:center;
">
</div>

<div class="form-group">

<label>Selecionar Mesa</label>

<select id="mesaSelecionada">

<option value="">
Escolha a mesa
</option>

</select>

</div>

<div class="menu-grid"
id="clienteMenu"></div>

<h2 style="margin-top:30px;">
🛒 Meu Pedido
</h2>

<div id="pedidoCliente"></div>

<div class="total"
id="totalCliente">
Total: R$ 0,00
</div>

<button
class="btn-primary"
onclick="enviarPedidoCliente()">
📤 Enviar Pedido
</button>

</div>

</div>

<!-- QR -->

<div id="qr" class="tab-content">

<div class="card">

<h2>🔳 QR Code das Mesas</h2>

<div class="form-group">
<label>Quantidade de Mesas</label>
<input type="number"
id="quantidadeMesas">
</div>

<button class="btn-primary"
onclick="gerarQRCodes()">
🔳 Gerar QR Codes
</button>

<div class="qr-grid"
id="qrGrid"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBsam8XGNicS8vlpehCVlI-8_JBKyk_v2M",
authDomain: "garcompro-bd3b3.firebaseapp.com",
projectId: "garcompro-bd3b3",
storageBucket: "garcompro-bd3b3.firebasestorage.app",
messagingSenderId: "311775314838",
appId: "1:311775314838:web:b4cafc21f9b8850811d3b7"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cardapio = [];
let pedidoCliente = [];

/* ABAS */

window.abrirAba = function(id, botao){

document.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document.querySelectorAll(".tab-btn")
.forEach(btn=>{
btn.classList.remove("active");
});

document.getElementById(id)
.classList.add("active");

botao.classList.add("active");

}

/* PRODUTOS */

async function carregarProdutos(){

const querySnapshot =
await getDocs(collection(db, "produtos"));

cardapio = [];

querySnapshot.forEach((docItem)=>{

cardapio.push({
firebaseId: docItem.id,
...docItem.data()
});

});

renderizarCliente();

}

window.adicionarItem = async function(){

const nome =
document.getElementById("nome").value;

const preco =
document.getElementById("preco").value;

const descricao =
document.getElementById("descricao").value;

const imagemInput =
document.getElementById("imagem");

if(!nome || !preco){

alert("Preencha os campos!");
return;

}

const arquivo =
imagemInput.files[0];

if(!arquivo){

alert("Selecione uma imagem!");
return;

}

const reader =
new FileReader();

reader.onload =
async function(e){

const produto = {

nome,
preco:parseFloat(preco),
descricao,
imagem:e.target.result

};

await addDoc(
collection(db, "produtos"),
produto
);

alert("Produto salvo!");

document.getElementById("nome").value = "";
document.getElementById("preco").value = "";
document.getElementById("descricao").value = "";
document.getElementById("imagem").value = "";

carregarProdutos();

};

reader.readAsDataURL(arquivo);

}

/* CLIENTE */

function renderizarCliente(){

const clienteMenu =
document.getElementById("clienteMenu");

clienteMenu.innerHTML = "";

cardapio.forEach(item=>{

clienteMenu.innerHTML += `

<div class="item-card">

<img src="${item.imagem}">

<div class="item-content">

<h3>${item.nome}</h3>

<div class="price">
R$ ${item.preco.toFixed(2)}
</div>

<div class="desc">
${item.descricao}
</div>

<button
class="btn-cliente"
onclick="adicionarPedidoCliente('${item.firebaseId}')">
Adicionar ao Pedido
</button>

</div>

</div>

`;

});

}

function carregarMesas(){

const select =
document.getElementById("mesaSelecionada");

select.innerHTML = `
<option value="">
Escolha a mesa
</option>
`;

for(let i=1;i<=100;i++){

select.innerHTML += `
<option value="${i}">
Mesa ${i}
</option>
`;

}

}

window.adicionarPedidoCliente = function(id){

const item =
cardapio.find(i=>i.firebaseId === id);

const existente =
pedidoCliente.find(i=>i.firebaseId === id);

if(existente){

existente.quantidade += 1;

}else{

pedidoCliente.push({
...item,
quantidade:1
});

}

renderizarPedidoCliente();

}

window.aumentarQuantidade = function(index){

pedidoCliente[index].quantidade += 1;
renderizarPedidoCliente();

}

window.diminuirQuantidade = function(index){

if(pedidoCliente[index].quantidade > 1){

pedidoCliente[index].quantidade -= 1;

}else{

pedidoCliente.splice(index,1);

}

renderizarPedidoCliente();

}

window.removerItemCliente = function(index){

pedidoCliente.splice(index,1);

renderizarPedidoCliente();

}

function renderizarPedidoCliente(){

const pedidoDiv =
document.getElementById("pedidoCliente");

pedidoDiv.innerHTML = "";

let total = 0;

pedidoCliente.forEach((item,index)=>{

const subtotal =
item.preco * item.quantidade;

total += subtotal;

pedidoDiv.innerHTML += `

<div class="order-item">

<div style="
display:flex;
justify-content:space-between;
margin-bottom:10px;
">

<div>${item.nome}</div>

<div>
R$ ${subtotal.toFixed(2)}
</div>

</div>

<div style="
display:flex;
gap:10px;
">

<button
class="btn-remove"
onclick="diminuirQuantidade(${index})">
-
</button>

<div style="
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#1e293b;
border-radius:10px;
font-weight:700;
">
${item.quantidade}
</div>

<button
class="btn-add"
onclick="aumentarQuantidade(${index})">
+
</button>

<button
class="btn-remove"
onclick="removerItemCliente(${index})">
🗑️
</button>

</div>

</div>

`;

});

document.getElementById("totalCliente")
.innerHTML =
"Total: R$ " + total.toFixed(2);

}

/* ENVIAR PEDIDO */

window.enviarPedidoCliente = async function(){

if(pedidoCliente.length === 0){

alert("Adicione itens!");
return;

}

const mesaSelecionada =
document.getElementById("mesaSelecionada").value;

if(!mesaSelecionada){

alert("Selecione a mesa!");
return;

}

let total = 0;

pedidoCliente.forEach(item=>{
total += item.preco * item.quantidade;
});

await addDoc(
collection(db, "pedidos"),
{
mesa:mesaSelecionada,
itens:pedidoCliente,
total,
status:"pendente",
data:new Date().toLocaleString()
}
);

alert("Pedido enviado!");

pedidoCliente = [];

renderizarPedidoCliente();

}

/* PEDIDOS ADMIN */

function carregarPedidosAdmin(){

const pedidosRef =
collection(db, "pedidos");

onSnapshot(pedidosRef, (snapshot)=>{

const lista =
document.getElementById("listaPedidosAdmin");

lista.innerHTML = "";

snapshot.forEach((docItem)=>{

const pedido = docItem.data();

let itensHTML = "";

pedido.itens.forEach(item=>{

const subtotal =
item.preco * item.quantidade;

itensHTML += `

<div class="order-item">

<div style="
display:flex;
justify-content:space-between;
">

<div>
${item.nome} x${item.quantidade}
</div>

<div>
R$ ${subtotal.toFixed(2)}
</div>

</div>

</div>

`;

});

lista.innerHTML += `

<div class="admin-pedido">

<h3>
🍽️ Mesa ${pedido.mesa}
</h3>

${itensHTML}

<div class="total">
R$ ${pedido.total.toFixed(2)}
</div>

<div class="status ${pedido.status}">
${pedido.status.toUpperCase()}
</div>

${
pedido.status === "pendente"
?
`
<button
class="btn-entregue"
onclick="marcarEntregue('${docItem.id}')">
✅ Marcar Entregue
</button>
`
:
`
<button
class="btn-primary"
style="
background:#f59e0b;
margin-top:15px;
"
onclick="marcarPendente('${docItem.id}')">
↩️ Voltar para Pendente
</button>

<button
class="btn-print"
style="margin-top:10px;"
onclick="imprimirNotaFiscalAdmin('${docItem.id}')">
🧾 Imprimir Nota Fiscal
</button>

<button
class="btn-remove"
style="
width:100%;
margin-top:10px;
"
onclick="apagarPedido('${docItem.id}')">
🗑️ Excluir Pedido
</button>
`
}

</div>

`;

});

});

}

window.marcarEntregue = async function(id){

await updateDoc(
doc(db, "pedidos", id),
{
status:"entregue"
}
);

}

window.marcarPendente = async function(id){

await updateDoc(
doc(db, "pedidos", id),
{
status:"pendente"
}
);

}

window.apagarPedido = async function(id){

if(confirm("Excluir pedido?")){

await deleteDoc(
doc(db, "pedidos", id)
);

}

}

/* QR */

window.gerarQRCodes = function(){

const quantidade =
parseInt(
document.getElementById("quantidadeMesas").value
);

const qrGrid =
document.getElementById("qrGrid");

qrGrid.innerHTML = "";

const cardapioURL =
window.location.origin +
window.location.pathname +
"?cliente=true";

for(let i=1;i<=quantidade;i++){

const qrId = "qrMesa"+i;

qrGrid.innerHTML += `

<div class="qr-card"
id="cardMesa${i}">

<h3>
🍽️ Mesa ${i}
</h3>

<div
id="${qrId}"
class="qrcode">
</div>

<p style="margin-top:10px;">
Escaneie para abrir o cardápio
</p>

<button
class="btn-print"
onclick="imprimirQRCode(${i})">
🖨️ Imprimir QR Code
</button>

</div>

`;

new QRCode(
document.getElementById(qrId),
{
text: cardapioURL + "&mesa=" + i,
width:180,
height:180
}
);

}

}

window.imprimirQRCode = function(mesa){

const qrCanvas =
document.querySelector(
"#qrMesa" + mesa + " canvas"
);

if(!qrCanvas){

alert("QR Code não encontrado!");
return;

}

const qrBase64 =
qrCanvas.toDataURL("image/png");

const janela =
window.open("", "_blank", "width=500,height=700");

janela.document.write(`

<html>

<head>

<title>QR Mesa ${mesa}</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:40px;
}

img{
width:260px;
height:260px;
margin-top:20px;
}

button{
margin-top:30px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

@media print{

button{
display:none;
}

}

</style>

</head>

<body>

<h1>🍽️ Mesa ${mesa}</h1>

<img src="${qrBase64}">

<p>
Escaneie para abrir o cardápio
</p>

<button onclick="window.print()">
🖨️ Imprimir
</button>

</body>

</html>

`);

janela.document.close();

}

/* NOTA FISCAL */

window.imprimirNotaFiscalAdmin = async function(id){

const pedidosSnapshot =
await getDocs(collection(db, "pedidos"));

let pedidoSelecionado = null;

pedidosSnapshot.forEach((docItem)=>{

if(docItem.id === id){

pedidoSelecionado = docItem.data();

}

});

if(!pedidoSelecionado){

alert("Pedido não encontrado!");
return;

}

const pedido = pedidoSelecionado;

const janela =
window.open("", "", "width=350,height=700");

let itensHTML = "";

pedido.itens.forEach(item=>{

const subtotal =
item.preco * item.quantidade;

itensHTML += `

<tr>

<td>${item.nome}</td>

<td style="text-align:center;">
${item.quantidade}
</td>

<td style="text-align:right;">
R$ ${subtotal.toFixed(2)}
</td>

</tr>

`;

});

janela.document.write(`

<html>

<head>

<title>Nota Fiscal</title>

<style>

body{
font-family:monospace;
padding:10px;
width:300px;
}

h1,h2,p{
text-align:center;
margin:5px 0;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

td{
padding:5px 0;
font-size:13px;
border-bottom:1px dashed #000;
}

.total{
margin-top:15px;
font-size:18px;
font-weight:bold;
text-align:right;
}

hr{
border:none;
border-top:1px dashed #000;
margin:10px 0;
}

button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

@media print{

button{
display:none;
}

}

</style>

</head>

<body>

<h1>GARÇOM PRO</h1>

<p>CUPOM NÃO FISCAL</p>

<hr>

<p>Mesa: ${pedido.mesa}</p>

<p>${new Date().toLocaleString()}</p>

<table>

<tr>

<td><strong>Item</strong></td>

<td style="text-align:center;">
<strong>Qtd</strong>
</td>

<td style="text-align:right;">
<strong>Total</strong>
</td>

</tr>

${itensHTML}

</table>

<div class="total">
TOTAL: R$ ${parseFloat(pedido.total).toFixed(2)}
</div>

<hr>

<h2>Obrigado pela preferência!</h2>

<button onclick="window.print()">
🖨️ Imprimir
</button>

</body>

</html>

`);

janela.document.close();

}

/* INICIAR */

carregarProdutos();
carregarPedidosAdmin();
carregarMesas();

/* MODO CLIENTE */

const params =
new URLSearchParams(window.location.search);

const modoCliente =
params.get("cliente");

if(modoCliente === "true"){

document.querySelector(".tabs")
.style.display = "none";

document.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document.getElementById("cliente")
.classList.add("active");

document.querySelector("header h1")
.innerHTML =
"📱 Cardápio Digital";

document.body.style.background =
"#111827";

}

</script>

</body>
</html>
