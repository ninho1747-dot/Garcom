<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GarçomPro Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

header h1{
font-size:28px;
font-weight:700;
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab-btn{
padding:14px 20px;
border:none;
border-radius:14px;
background:#1e293b;
color:#fff;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.tab-btn.active{
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:22px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:20px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:8px;
}

input,
textarea{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#334155;
color:white;
}

textarea{
resize:none;
height:80px;
}

button{
border:none;
padding:14px;
border-radius:14px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

.btn-primary{
width:100%;
background:linear-gradient(135deg,#8b5cf6,#2563eb);
color:white;
margin-top:10px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.item-card{
background:#111827;
border-radius:20px;
overflow:hidden;
}

.item-card img{
width:100%;
height:180px;
object-fit:cover;
}

.item-content{
padding:15px;
}

.price{
color:#4ade80;
font-weight:700;
margin:10px 0;
}

.desc{
color:#cbd5e1;
margin-bottom:15px;
font-size:14px;
}

.actions{
display:flex;
gap:10px;
}

.btn-add{
flex:1;
background:#2563eb;
color:white;
}

.btn-remove{
width:50px;
background:#dc2626;
color:white;
}

.order-item{
background:#334155;
padding:12px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

.total{
font-size:24px;
font-weight:700;
margin-top:20px;
text-align:right;
color:#4ade80;
}

.empty{
padding:30px;
text-align:center;
opacity:0.6;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.qr-card{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
}

.qrcode{
background:white;
padding:10px;
border-radius:12px;
display:inline-block;
margin-top:10px;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<header>
<h1>🍽️ GarçomPro Firebase</h1>
</header>

<div class="container">

<div class="tabs">

<button class="tab-btn active"
onclick="abrirAba('garcom', this)">
🍽️ Garçom
</button>

<button class="tab-btn"
onclick="abrirAba('admin', this)">
⚙️ Admin
</button>

<button class="tab-btn"
onclick="abrirAba('cliente', this)">
📱 Cliente
</button>

<button class="tab-btn"
onclick="abrirAba('qr', this)">
🔳 QR Code
</button>

</div>

<!-- GARÇOM -->
<div id="garcom" class="tab-content active">

<div class="grid">

<div class="card">

<h2>🧾 Pedido Atual</h2>

<div class="form-group">
<label>Número da Mesa</label>
<input type="number" id="mesa">
</div>

<div id="pedido"></div>

<div class="total" id="total">
Total: R$ 0,00
</div>

<button class="btn-primary"
onclick="baixarNotaFiscal()">
🧾 Baixar Nota Fiscal
</button>

</div>

<div class="card">

<h2>📋 Cardápio</h2>

<div class="menu-grid"
id="menuGrid"></div>

</div>

</div>

</div>

<!-- ADMIN -->
<div id="admin" class="tab-content">

<div class="card">

<h2>⚙️ Painel Administrativo</h2>

<div class="form-group">
<label>Nome</label>
<input type="text" id="nome">
</div>

<div class="form-group">
<label>Preço</label>
<input type="number" id="preco">
</div>

<div class="form-group">
<label>Descrição</label>
<textarea id="descricao"></textarea>
</div>

<div class="form-group">
<label>Foto</label>
<input type="file"
id="imagem"
accept="image/*">
</div>

<button class="btn-primary"
onclick="adicionarItem()">
➕ Adicionar Produto
</button>

</div>

</div>

<!-- CLIENTE -->
<div id="cliente" class="tab-content">

<div class="card">

<h2>📱 Cardápio Digital</h2>

<div class="menu-grid"
id="clienteMenu"></div>

</div>

</div>

<!-- QR -->
<div id="qr" class="tab-content">

<div class="card">

<h2>🔳 QR Code das Mesas</h2>

<div class="form-group">
<label>Quantidade de Mesas</label>
<input type="number"
id="quantidadeMesas">
</div>

<button class="btn-primary"
onclick="gerarQRCodes()">
🔳 Gerar QR Codes
</button>

<div class="qr-grid"
id="qrGrid"></div>

</div>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBsam8XGNicS8vlpehCVlI-8_JBKyk_v2M",

authDomain: "garcompro-bd3b3.firebaseapp.com",

projectId: "garcompro-bd3b3",

storageBucket: "garcompro-bd3b3.firebasestorage.app",

messagingSenderId: "311775314838",

appId: "1:311775314838:web:b4cafc21f9b8850811d3b7"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* PDF */

const { jsPDF } = window.jspdf;

/* DADOS */

let cardapio = [];
let pedido = [];

/* ABAS */

window.abrirAba = function(id, botao){

document.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document.querySelectorAll(".tab-btn")
.forEach(btn=>{
btn.classList.remove("active");
});

document.getElementById(id)
.classList.add("active");

botao.classList.add("active");

}

/* CARREGAR PRODUTOS */

async function carregarProdutos(){

const querySnapshot =
await getDocs(collection(db, "produtos"));

cardapio = [];

querySnapshot.forEach((docItem)=>{

cardapio.push({

firebaseId: docItem.id,
...docItem.data()

});

});

renderizarCardapio();
renderizarCliente();

}

/* ADICIONAR PRODUTO */

window.adicionarItem = async function(){

const nome =
document.getElementById("nome").value;

const preco =
document.getElementById("preco").value;

const descricao =
document.getElementById("descricao").value;

const imagemInput =
document.getElementById("imagem");

if(!nome || !preco){

alert("Preencha os campos!");
return;

}

const arquivo =
imagemInput.files[0];

if(arquivo){

const reader =
new FileReader();

reader.onload =
async function(e){

const produto = {

nome,
preco:parseFloat(preco),
descricao,
imagem:e.target.result

};

await addDoc(
collection(db, "produtos"),
produto
);

alert("Produto salvo!");

limparFormulario();

carregarProdutos();

};

reader.readAsDataURL(arquivo);

}

}

/* LIMPAR FORM */

function limparFormulario(){

document.getElementById("nome").value = "";
document.getElementById("preco").value = "";
document.getElementById("descricao").value = "";
document.getElementById("imagem").value = "";

}

/* RENDER CARDÁPIO */

function renderizarCardapio(){

const menuGrid =
document.getElementById("menuGrid");

if(cardapio.length === 0){

menuGrid.innerHTML = `
<div class="empty">
Nenhum produto cadastrado
</div>
`;

return;

}

menuGrid.innerHTML = "";

cardapio.forEach(item=>{

menuGrid.innerHTML += `

<div class="item-card">

<img src="${item.imagem}">

<div class="item-content">

<h3>${item.nome}</h3>

<div class="price">
R$ ${item.preco.toFixed(2)}
</div>

<div class="desc">
${item.descricao}
</div>

<div class="actions">

<button class="btn-add"
onclick="adicionarPedido('${item.firebaseId}')">
Adicionar
</button>

<button class="btn-remove"
onclick="removerProduto('${item.firebaseId}')">
✕
</button>

</div>

</div>

</div>

`;

});

}

/* CARDÁPIO CLIENTE */

function renderizarCliente(){

const clienteMenu =
document.getElementById("clienteMenu");

clienteMenu.innerHTML = "";

cardapio.forEach(item=>{

clienteMenu.innerHTML += `

<div class="item-card">

<img src="${item.imagem}">

<div class="item-content">

<h3>${item.nome}</h3>

<div class="price">
R$ ${item.preco.toFixed(2)}
</div>

<div class="desc">
${item.descricao}
</div>

</div>

</div>

`;

});

}

/* REMOVER PRODUTO */

window.removerProduto = async function(id){

if(confirm("Deseja remover?")){

await deleteDoc(
doc(db, "produtos", id)
);

carregarProdutos();

}

}

/* PEDIDOS */

window.adicionarPedido = function(id){

const item =
cardapio.find(i=>i.firebaseId === id);

pedido.push(item);

renderizarPedido();

}

function renderizarPedido(){

const pedidoDiv =
document.getElementById("pedido");

if(pedido.length === 0){

pedidoDiv.innerHTML = `
<div class="empty">
Nenhum item
</div>
`;

document.getElementById("total")
.innerHTML = "Total: R$ 0,00";

return;

}

pedidoDiv.innerHTML = "";

let total = 0;

pedido.forEach(item=>{

total += item.preco;

pedidoDiv.innerHTML += `

<div class="order-item">

<div>${item.nome}</div>

<div>
R$ ${item.preco.toFixed(2)}
</div>

</div>

`;

});

document.getElementById("total")
.innerHTML =
"Total: R$ " + total.toFixed(2);

}

/* PDF */

window.baixarNotaFiscal = function(){

const mesa =
document.getElementById("mesa").value;

if(!mesa){

alert("Informe a mesa!");
return;

}

if(pedido.length === 0){

alert("Nenhum item!");
return;

}

const docPDF = new jsPDF();

docPDF.setFontSize(20);

docPDF.text("NOTA FISCAL", 65, 20);

docPDF.setFontSize(12);

docPDF.text(
"Mesa: " + mesa,
20,
40
);

docPDF.text(
"Data: " +
new Date().toLocaleDateString(),
20,
50
);

let y = 70;

let total = 0;

pedido.forEach(item=>{

docPDF.text(
item.nome +
" - R$ " +
item.preco.toFixed(2),
20,
y
);

y += 10;

total += item.preco;

});

docPDF.setFontSize(16);

docPDF.text(
"TOTAL: R$ " +
total.toFixed(2),
20,
y + 20
);

docPDF.save(
"nota-fiscal-mesa-"+mesa+".pdf"
);

}

/* QR CODE */

window.gerarQRCodes = function(){

const quantidade =
parseInt(
document.getElementById("quantidadeMesas").value
);

const qrGrid =
document.getElementById("qrGrid");

if(!quantidade){

alert("Informe a quantidade!");
return;

}

qrGrid.innerHTML = "";

/* LINK SOMENTE CARDÁPIO */

const cardapioURL =
window.location.origin +
window.location.pathname +
"?cliente=true";

for(let i=1;i<=quantidade;i++){

const qrId = "qrMesa"+i;

qrGrid.innerHTML += `

<div class="qr-card">

<h3>
🍽️ Mesa ${i}
</h3>

<div
id="${qrId}"
class="qrcode">
</div>

<p style="margin-top:10px;">
Escaneie para abrir o cardápio
</p>

</div>

`;

new QRCode(
document.getElementById(qrId),
{
text: cardapioURL + "&mesa=" + i,
width:180,
height:180
}
);

}

}

/* INICIAR */

carregarProdutos();

renderizarPedido();

/* MODO CLIENTE */

const params =
new URLSearchParams(window.location.search);

const modoCliente =
params.get("cliente");

if(modoCliente === "true"){

document.querySelector(".tabs")
.style.display = "none";

document.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document.getElementById("cliente")
.classList.add("active");

document.querySelector("header h1")
.innerHTML =
"📱 Cardápio Digital";

document.body.style.background =
"#111827";

}

</script>

</body>
</html>
