<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GarçomPro Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab-btn{
padding:14px 18px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
cursor:pointer;
font-weight:600;
}

.tab-btn.active{
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:20px;
}

input,textarea,select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#334155;
color:white;
margin-top:8px;
}

button{
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
font-weight:700;
}

.btn-primary{
background:#2563eb;
color:white;
width:100%;
margin-top:12px;
}

.btn-green{
background:#16a34a;
color:white;
}

.btn-red{
background:#dc2626;
color:white;
}

.btn-orange{
background:#f59e0b;
color:white;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.item-card{
background:#111827;
border-radius:18px;
overflow:hidden;
}

.item-card img{
width:100%;
height:180px;
object-fit:cover;
}

.item-content{
padding:15px;
}

.price{
color:#4ade80;
font-weight:700;
margin:10px 0;
}

.order-item{
background:#334155;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

.total{
font-size:22px;
font-weight:700;
margin-top:20px;
color:#4ade80;
text-align:right;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.qr-card{
background:#111827;
padding:20px;
border-radius:18px;
text-align:center;
}

.qrcode{
background:white;
padding:10px;
border-radius:12px;
display:inline-block;
margin-top:15px;
}

.status{
padding:6px 10px;
border-radius:10px;
font-size:13px;
font-weight:700;
display:inline-block;
margin-top:10px;
}

.pendente{background:#dc2626;}
.entregue{background:#16a34a;}
.ocupada{background:#dc2626;}
.livre{background:#16a34a;}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<header>
<h1>🍽️ GarçomPro Firebase</h1>
</header>

<div class="container">

<div class="tabs">
<button class="tab-btn active" onclick="abrirAba('admin',this)">⚙️ Admin</button>
<button class="tab-btn" onclick="abrirAba('cliente',this)">📱 Cliente</button>
<button class="tab-btn" onclick="abrirAba('qr',this)">🔳 QR Code</button>
</div>

<div id="admin" class="tab-content active">
<div class="grid">

<div>
<div class="card">
<h2>Adicionar Produto</h2>

<input type="text" id="nome" placeholder="Nome">
<input type="number" id="preco" placeholder="Preço">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input type="file" id="imagem" accept="image/*">

<button class="btn-primary" onclick="adicionarItem()">➕ Adicionar Produto</button>
</div>
</div>

<div>
<div class="card">
<h2>Pedidos</h2>
<div id="listaPedidosAdmin"></div>
</div>
</div>

</div>
</div>

<div id="cliente" class="tab-content">
<div class="card">
<h2>📱 Cardápio Digital</h2>

<select id="mesaSelecionada"></select>

<div class="menu-grid" id="clienteMenu"></div>

<h2 style="margin-top:25px;">🛒 Meu Pedido</h2>
<div id="pedidoCliente"></div>

<div class="total" id="totalCliente">Total: R$ 0,00</div>

<button class="btn-primary" onclick="enviarPedidoCliente()">📤 Enviar Pedido</button>
</div>
</div>

<div id="qr" class="tab-content">
<div class="card">
<h2>🔳 QR Codes</h2>

<input type="number" id="quantidadeMesas" placeholder="Quantidade de mesas">

<button class="btn-primary" onclick="gerarQRCodes()">Gerar QR Codes</button>

<div class="qr-grid" id="qrGrid"></div>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
onSnapshot,
setDoc,
getDoc
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
apiKey: 'AIzaSyBsam8XGNicS8vlpehCVlI-8_JBKyk_v2M',
authDomain: 'garcompro-bd3b3.firebaseapp.com',
projectId: 'garcompro-bd3b3',
storageBucket: 'garcompro-bd3b3.firebasestorage.app',
messagingSenderId: '311775314838',
appId: '1:311775314838:web:b4cafc21f9b8850811d3b7'
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cardapio = [];
let pedidoCliente = [];

window.abrirAba = function(id,botao){

document.querySelectorAll('.tab-content').forEach(tab=>{
tab.classList.remove('active');
});

document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.classList.remove('active');
});

document.getElementById(id).classList.add('active');
botao.classList.add('active');
}

async function carregarProdutos(){

const querySnapshot = await getDocs(collection(db,'produtos'));

cardapio = [];

querySnapshot.forEach((docItem)=>{
cardapio.push({
firebaseId: docItem.id,
...docItem.data()
});
});

renderizarCliente();
}

window.adicionarItem = async function(){

const nome = document.getElementById('nome').value;
const preco = document.getElementById('preco').value;
const descricao = document.getElementById('descricao').value;
const imagemInput = document.getElementById('imagem');

if(!nome || !preco){
alert('Preencha os campos');
return;
}

const arquivo = imagemInput.files[0];

if(!arquivo){
alert('Selecione uma imagem');
return;
}

const reader = new FileReader();

reader.onload = async function(e){

await addDoc(collection(db,'produtos'),{
nome,
preco:parseFloat(preco),
descricao,
imagem:e.target.result
});

alert('Produto adicionado');

nome.value='';

carregarProdutos();
}

reader.readAsDataURL(arquivo);
}

function renderizarCliente(){

const menu = document.getElementById('clienteMenu');
menu.innerHTML='';

cardapio.forEach(item=>{

menu.innerHTML += `
<div class="item-card">
<img src="${item.imagem}">
<div class="item-content">
<h3>${item.nome}</h3>
<div class="price">R$ ${item.preco.toFixed(2)}</div>
<p>${item.descricao}</p>
<button class="btn-primary" onclick="adicionarPedidoCliente('${item.firebaseId}')">Adicionar</button>
</div>
</div>
`;
});
}

function carregarMesas(){

const select = document.getElementById('mesaSelecionada');
select.innerHTML='';

for(let i=1;i<=100;i++){
select.innerHTML += `<option value="${i}">Mesa ${i}</option>`;
}

mostrarStatusMesas();
}

async function mostrarStatusMesas(){

const select = document.getElementById('mesaSelecionada');

for(let i=1;i<=100;i++){

const mesaRef = doc(db,'mesas',String(i));
const mesaSnap = await getDoc(mesaRef);

if(mesaSnap.exists()){
const dados = mesaSnap.data();

const option = select.querySelector(`option[value="${i}"]`);

if(option){
option.textContent = `Mesa ${i} - ${dados.status}`;
}
}
}
}

window.adicionarPedidoCliente = function(id){

const item = cardapio.find(i=>i.firebaseId===id);

const existe = pedidoCliente.find(i=>i.firebaseId===id);

if(existe){
existe.quantidade +=1;
}else{
pedidoCliente.push({...item,quantidade:1});
}

renderizarPedidoCliente();
}

window.aumentarQuantidade = function(index){
pedidoCliente[index].quantidade++;
renderizarPedidoCliente();
}

window.diminuirQuantidade = function(index){

if(pedidoCliente[index].quantidade>1){
pedidoCliente[index].quantidade--;
}else{
pedidoCliente.splice(index,1);
}

renderizarPedidoCliente();
}

window.removerItemCliente = function(index){
pedidoCliente.splice(index,1);
renderizarPedidoCliente();
}

function renderizarPedidoCliente(){

const pedidoDiv = document.getElementById('pedidoCliente');
pedidoDiv.innerHTML='';

let total = 0;

pedidoCliente.forEach((item,index)=>{

const subtotal = item.preco * item.quantidade;

total += subtotal;

pedidoDiv.innerHTML += `
<div class="order-item">
<div style="display:flex;justify-content:space-between;">
<strong>${item.nome}</strong>
<strong>R$ ${subtotal.toFixed(2)}</strong>
</div>

<div style="display:flex;gap:10px;margin-top:10px;">
<button class="btn-red" onclick="diminuirQuantidade(${index})">-</button>
<div style="flex:1;text-align:center;padding:10px;background:#1e293b;border-radius:10px;">${item.quantidade}</div>
<button class="btn-primary" onclick="aumentarQuantidade(${index})">+</button>
<button class="btn-red" onclick="removerItemCliente(${index})">🗑️</button>
</div>
</div>
`;
});

 document.getElementById('totalCliente').innerHTML = `Total: R$ ${total.toFixed(2)}`;
}

window.enviarPedidoCliente = async function(){

if(pedidoCliente.length===0){
alert('Adicione itens');
return;
}

const mesa = document.getElementById('mesaSelecionada').value;

let total = 0;

pedidoCliente.forEach(item=>{
total += item.preco * item.quantidade;
});

await addDoc(collection(db,'pedidos'),{
mesa,
itens:pedidoCliente,
total,
status:'pendente',
data:new Date().toLocaleString()
});

await setDoc(doc(db,'mesas',mesa),{
status:'ocupada'
});

alert('Pedido enviado');

pedidoCliente=[];
renderizarPedidoCliente();
mostrarStatusMesas();
}

function carregarPedidosAdmin(){

onSnapshot(collection(db,'pedidos'),(snapshot)=>{

const lista = document.getElementById('listaPedidosAdmin');
lista.innerHTML='';

snapshot.forEach((docItem)=>{

const pedido = docItem.data();

let itens='';

pedido.itens.forEach(item=>{
const subtotal = item.preco * item.quantidade;

itens += `
<div class="order-item">
${item.nome} x${item.quantidade} - R$ ${subtotal.toFixed(2)}
</div>
`;
});

lista.innerHTML += `
<div class="card">
<h3>🍽️ Mesa ${pedido.mesa}</h3>
${itens}
<div class="total">R$ ${pedido.total.toFixed(2)}</div>
<div class="status ${pedido.status}">${pedido.status}</div>

<button class="btn-green" style="width:100%;margin-top:10px;" onclick="marcarEntregue('${docItem.id}','${pedido.mesa}')">✅ Entregue</button>

<button class="btn-orange" style="width:100%;margin-top:10px;" onclick="liberarMesa('${pedido.mesa}')">🟢 Liberar Mesa</button>

<button class="btn-red" style="width:100%;margin-top:10px;" onclick="apagarPedido('${docItem.id}')">🗑️ Excluir Pedido</button>
</div>
`;
});
});
}

window.marcarEntregue = async function(id,mesa){

await updateDoc(doc(db,'pedidos',id),{
status:'entregue'
});

await setDoc(doc(db,'mesas',mesa),{
status:'ocupada'
});
}

window.liberarMesa = async function(mesa){

await setDoc(doc(db,'mesas',mesa),{
status:'livre'
});

mostrarStatusMesas();
alert('Mesa liberada');
}

window.apagarPedido = async function(id){

if(confirm('Excluir pedido?')){
await deleteDoc(doc(db,'pedidos',id));
}
}

window.gerarQRCodes = async function(){

const quantidade = parseInt(document.getElementById('quantidadeMesas').value);

if(!quantidade || quantidade < 1){
alert('Informe a quantidade de mesas');
return;
}

const qrGrid = document.getElementById('qrGrid');

const baseURL = window.location.origin + window.location.pathname + '?cliente=true';

for(let i=1;i<=quantidade;i++){

const mesaId = 'mesa_'+i;

const existe = document.getElementById(mesaId);

if(existe){
continue;
}

const card = document.createElement('div');
card.className = 'qr-card';
card.id = mesaId;

card.innerHTML = `
<h3>🍽️ Mesa ${i}</h3>

<div id="qrMesa${i}" class="qrcode"></div>

<div id="statusMesa${i}" class="status livre">
🟢 LIVRE
</div>

<div style="margin-top:15px;display:flex;flex-direction:column;gap:10px;">

<button class="btn-primary" onclick="imprimirQRCode(${i})">
🖨️ Imprimir QR Code
</button>

<button class="btn-orange" onclick="alternarMesa(${i})">
🔄 Livre / Ocupada
</button>

<button class="btn-red" onclick="apagarQRCode(${i})">
🗑️ Excluir QR
</button>

</div>
`;

qrGrid.appendChild(card);

new QRCode(document.getElementById('qrMesa'+i),{
text: baseURL + '&mesa=' + i,
width:180,
height:180
});

const mesaRef = doc(db,'mesas',String(i));
const mesaSnap = await getDoc(mesaRef);

if(!mesaSnap.exists()){
await setDoc(mesaRef,{
status:'livre'
});
}

atualizarStatusMesa(i);
}
}

window.alternarMesa = async function(mesa){

const mesaRef = doc(db,'mesas',String(mesa));
const mesaSnap = await getDoc(mesaRef);

let novoStatus = 'ocupada';

if(mesaSnap.exists()){
const dados = mesaSnap.data();
novoStatus = dados.status === 'ocupada' ? 'livre' : 'ocupada';
}

await setDoc(mesaRef,{
status:novoStatus
});

atualizarStatusMesa(mesa);
mostrarStatusMesas();
}

async function atualizarStatusMesa(mesa){

const mesaRef = doc(db,'mesas',String(mesa));
const mesaSnap = await getDoc(mesaRef);

const statusDiv = document.getElementById('statusMesa'+mesa);

if(!statusDiv || !mesaSnap.exists()){
return;
}

const dados = mesaSnap.data();

if(dados.status === 'ocupada'){
statusDiv.className = 'status ocupada';
statusDiv.innerHTML = '🔴 OCUPADA';
}else{
statusDiv.className = 'status livre';
statusDiv.innerHTML = '🟢 LIVRE';
}
}

window.apagarQRCode = function(mesa){

const card = document.getElementById('cardMesa'+mesa);

if(card){
card.remove();
}
}

window.imprimirQRCode = function(mesa){

const qrCanvas = document.querySelector('#qrMesa'+mesa+' canvas');

if(!qrCanvas){
alert('QR Code não encontrado');
return;
}

const imagem = qrCanvas.toDataURL('image/png');

const janela = window.open('','','width=500,height=700');

janela.document.write(`
<html>
<head>
<title>Mesa ${mesa}</title>
<style>
body{
font-family:Arial;
text-align:center;
padding:40px;
}
img{
width:250px;
height:250px;
}
</style>
</head>
<body>
<h1>Mesa ${mesa}</h1>
<img src="${imagem}">
<script>
window.onload = function(){
window.print();
}
<\/script>
</body>
</html>
`);

janela.document.close();
}

carregarProdutos();
carregarPedidosAdmin();
carregarMesas();

const params = new URLSearchParams(window.location.search);
const modoCliente = params.get('cliente');
const mesaURL = params.get('mesa');

if(modoCliente==='true'){

document.querySelector('.tabs').style.display='none';

document.querySelectorAll('.tab-content').forEach(tab=>{
tab.classList.remove('active');
});

document.getElementById('cliente').classList.add('active');

if(mesaURL){
document.getElementById('mesaSelecionada').value = mesaURL;
}
}

</script>
</body>
</html>
