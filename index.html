<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GarçomPro Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:20px;
text-align:center;
}

header h1{
font-size:32px;
font-weight:700;
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab-btn{
padding:14px 20px;
border:none;
border-radius:14px;
background:#1e293b;
color:#fff;
font-weight:600;
cursor:pointer;
}

.tab-btn.active{
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:22px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:350px 1fr;
gap:20px;
}

.form-group{
margin-bottom:15px;
}

input,
textarea,
select{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#334155;
color:white;
}

button{
border:none;
padding:14px;
border-radius:14px;
font-weight:600;
cursor:pointer;
}

.btn-primary{
width:100%;
background:linear-gradient(135deg,#8b5cf6,#2563eb);
color:white;
margin-top:10px;
}

.btn-remove{
background:#dc2626;
color:white;
}

.btn-add{
background:#16a34a;
color:white;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.item-card{
background:#111827;
border-radius:20px;
overflow:hidden;
}

.item-card img{
width:100%;
height:180px;
object-fit:cover;
}

.item-content{
padding:15px;
}

.price{
color:#4ade80;
font-weight:700;
margin:10px 0;
}

.desc{
color:#cbd5e1;
font-size:14px;
margin-bottom:15px;
}

.qtd-box{
display:flex;
gap:10px;
margin-top:10px;
}

.qtd-box button{
flex:1;
}

.order-item{
background:#334155;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

.total{
font-size:25px;
font-weight:700;
margin-top:20px;
text-align:right;
color:#4ade80;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.qr-card{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
}

.qrcode{
background:white;
padding:10px;
border-radius:12px;
display:inline-block;
margin-top:10px;
}

.status{
padding:8px 12px;
border-radius:10px;
display:inline-block;
margin-top:10px;
font-weight:700;
}

.ocupada{
background:#dc2626;
}

.livre{
background:#16a34a;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<header>
<h1>🍽️ GarçomPro Firebase</h1>
</header>

<div class="container">

<div class="tabs" id="tabsSistema">

<button class="tab-btn active"
onclick="abrirAba('garcom',this)">
🍽️ Garçom
</button>

<button class="tab-btn"
onclick="abrirAba('admin',this)">
⚙️ Admin
</button>

<button class="tab-btn"
onclick="abrirAba('cliente',this)">
📱 Cliente
</button>

<button class="tab-btn"
onclick="abrirAba('qr',this)">
🔳 QR Codes
</button>

</div>

<!-- GARÇOM -->

<div id="garcom" class="tab-content active">

<div class="card">

<h2>🧾 Pedido Manual</h2>

<div class="form-group">
<select id="mesaGarcom"></select>
</div>

<div id="garcomMenu" class="menu-grid"></div>

<h2 style="margin-top:30px;">🛒 Pedido</h2>

<div id="pedidoGarcom"></div>

<div class="total" id="totalGarcom">
Total: R$ 0,00
</div>

<button class="btn-primary"
onclick="enviarPedidoGarcom()">
📤 Enviar Pedido
</button>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="tab-content">

<div class="grid">

<div>

<div class="card">

<h2>⚙️ Adicionar Produto</h2>

<div class="form-group">
<input type="text" id="nome" placeholder="Nome">
</div>

<div class="form-group">
<input type="number" id="preco" placeholder="Preço">
</div>

<div class="form-group">
<textarea id="descricao" placeholder="Descrição"></textarea>
</div>

<div class="form-group">
<select id="categoria">
<option value="Bebidas">Bebidas</option>
<option value="Tira Gostos">Tira Gostos</option>
<option value="Jantar">Jantar</option>
</select>
</div>

<div class="form-group">
<input type="file" id="imagem" accept="image/*">
</div>

<button class="btn-primary"
onclick="adicionarProduto()">
➕ Adicionar Produto
</button>

</div>

</div>

<div>

<div class="card">

<h2>📦 Pedidos</h2>

<div id="listaPedidos"></div>

</div>

</div>

</div>

</div>

<!-- CLIENTE -->

<div id="cliente" class="tab-content">

<div class="card">

<h2>📱 Cardápio Digital</h2>

<div id="mesaInfo"></div>

<div id="clienteMenu"></div>

<h2 style="margin-top:30px;">🛒 Meu Pedido</h2>

<div id="pedidoCliente"></div>

<div class="total" id="totalCliente">
Total: R$ 0,00
</div>

<button class="btn-primary"
onclick="enviarPedidoCliente()">
📤 Fazer Pedido
</button>

</div>

</div>

<!-- QR -->

<div id="qr" class="tab-content">

<div class="card">

<h2>🔳 QR Codes Permanentes</h2>

<div class="form-group">
<input type="number" id="quantidadeMesas" placeholder="Quantidade de mesas">
</div>

<button class="btn-primary"
onclick="gerarQRCodes()">
🔳 Gerar QR Codes
</button>

<div class="qr-grid" id="qrGrid"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
deleteDoc,
doc,
setDoc,
getDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBsam8XGNicS8vlpehCVlI-8_JBKyk_v2M",
authDomain:"garcompro-bd3b3.firebaseapp.com",
projectId:"garcompro-bd3b3",
storageBucket:"garcompro-bd3b3.appspot.com",
messagingSenderId:"311775314838",
appId:"1:311775314838:web:b4cafc21f9b8850811d3b7"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let produtos = [];
let pedidoCliente = [];
let pedidoGarcom = [];

window.abrirAba = function(id,botao){

document.querySelectorAll(".tab-content")
.forEach(t=>t.classList.remove("active"));

document.querySelectorAll(".tab-btn")
.forEach(b=>b.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

botao.classList.add("active");

}

/* PRODUTOS */

async function carregarProdutos(){

const snap =
await getDocs(collection(db,"produtos"));

produtos = [];

snap.forEach(docu=>{

produtos.push({
id:docu.id,
...docu.data()
});

});

renderizarMenus();

}

window.adicionarProduto = async function(){

const nome =
document.getElementById("nome").value;

const preco =
document.getElementById("preco").value;

const descricao =
document.getElementById("descricao").value;

const categoria =
document.getElementById("categoria").value;

const imagem =
document.getElementById("imagem").files[0];

if(!nome || !preco || !imagem){

alert("Preencha tudo");
return;

}

const reader = new FileReader();

reader.onload = async function(e){

await addDoc(collection(db,"produtos"),{

nome,
preco:parseFloat(preco),
descricao,
categoria,
imagem:e.target.result

});

alert("Produto adicionado!");

carregarProdutos();

};

reader.readAsDataURL(imagem);

}

/* MENUS */

function renderizarMenus(){

renderizarCliente();
renderizarGarcom();

}

function criarCard(item,origem){

return `

<div class="item-card">

<img src="${item.imagem}">

<div class="item-content">

<h3>${item.nome}</h3>

<div class="price">
R$ ${item.preco.toFixed(2)}
</div>

<div class="desc">
${item.descricao}
</div>

<div class="qtd-box">

<button class="btn-add"
onclick="${origem}Adicionar('${item.id}')">
+
</button>

<button class="btn-remove"
onclick="${origem}Remover('${item.id}')">
-
</button>

</div>

</div>

</div>

`;

}

/* CLIENTE */

function renderizarCliente(){

const div =
document.getElementById("clienteMenu");

div.innerHTML = "";

["Bebidas","Tira Gostos","Jantar"]
.forEach(cat=>{

div.innerHTML += `
<h2 style="margin-top:30px;">
${cat}
</h2>
`;

const itens =
produtos.filter(p=>p.categoria===cat);

div.innerHTML += `
<div class="menu-grid">
${itens.map(i=>criarCard(i,"cliente")).join("")}
</div>
`;

});

}

window.clienteAdicionar = function(id){

const item =
produtos.find(p=>p.id===id);

const existe =
pedidoCliente.find(p=>p.id===id);

if(existe){

existe.quantidade++;

}else{

pedidoCliente.push({
...item,
quantidade:1
});

}

renderPedidoCliente();

}

window.clienteRemover = function(id){

const item =
pedidoCliente.find(p=>p.id===id);

if(!item) return;

item.quantidade--;

if(item.quantidade<=0){

pedidoCliente =
pedidoCliente.filter(p=>p.id!==id);

}

renderPedidoCliente();

}

function renderPedidoCliente(){

const div =
document.getElementById("pedidoCliente");

div.innerHTML = "";

let total = 0;

pedidoCliente.forEach(item=>{

const sub =
item.preco * item.quantidade;

total += sub;

div.innerHTML += `

<div class="order-item">

<div style="
display:flex;
justify-content:space-between;
">

<div>
${item.nome} x${item.quantidade}
</div>

<div>
R$ ${sub.toFixed(2)}
</div>

</div>

</div>

`;

});

document.getElementById("totalCliente")
.innerHTML =
"Total: R$ "+total.toFixed(2);

}

window.enviarPedidoCliente =
async function(){

const mesa =
new URLSearchParams(location.search)
.get("mesa");

if(!mesa){

alert("Mesa inválida");
return;

}

if(pedidoCliente.length===0){

alert("Adicione itens");
return;

}

await addDoc(collection(db,"pedidos"),{

mesa,
itens:pedidoCliente,
status:"pendente",
total:pedidoCliente.reduce((a,b)=>
a+(b.preco*b.quantidade),0)

});

await updateDoc(
doc(db,"mesas",mesa),
{
status:"ocupada"
}
);

alert("Pedido enviado!");

pedidoCliente = [];
renderPedidoCliente();

}

/* GARÇOM */

function renderizarGarcom(){

const div =
document.getElementById("garcomMenu");

div.innerHTML = "";

produtos.forEach(item=>{

div.innerHTML += criarCard(item,"garcom");

});

}

window.garcomAdicionar = function(id){

const item =
produtos.find(p=>p.id===id);

const existe =
pedidoGarcom.find(p=>p.id===id);

if(existe){

existe.quantidade++;

}else{

pedidoGarcom.push({
...item,
quantidade:1
});

}

renderPedidoGarcom();

}

window.garcomRemover = function(id){

const item =
pedidoGarcom.find(p=>p.id===id);

if(!item) return;

item.quantidade--;

if(item.quantidade<=0){

pedidoGarcom =
pedidoGarcom.filter(p=>p.id!==id);

}

renderPedidoGarcom();

}

function renderPedidoGarcom(){

const div =
document.getElementById("pedidoGarcom");

div.innerHTML = "";

let total = 0;

pedidoGarcom.forEach(item=>{

const sub =
item.preco * item.quantidade;

total += sub;

div.innerHTML += `

<div class="order-item">

<div style="
display:flex;
justify-content:space-between;
">

<div>
${item.nome} x${item.quantidade}
</div>

<div>
R$ ${sub.toFixed(2)}
</div>

</div>

</div>

`;

});

document.getElementById("totalGarcom")
.innerHTML =
"Total: R$ "+total.toFixed(2);

}

window.enviarPedidoGarcom =
async function(){

const mesa =
document.getElementById("mesaGarcom")
.value;

if(!mesa){

alert("Selecione a mesa");
return;

}

if(pedidoGarcom.length===0){

alert("Adicione itens");
return;

}

await addDoc(collection(db,"pedidos"),{

mesa,
itens:pedidoGarcom,
status:"pendente",
total:pedidoGarcom.reduce((a,b)=>
a+(b.preco*b.quantidade),0)

});

await updateDoc(
doc(db,"mesas",mesa),
{
status:"ocupada"
}
);

alert("Pedido enviado!");

pedidoGarcom = [];
renderPedidoGarcom();

}

/* PEDIDOS */

function carregarPedidos(){

onSnapshot(
collection(db,"pedidos"),
(snapshot)=>{

const div =
document.getElementById("listaPedidos");

div.innerHTML = "";

snapshot.forEach(docu=>{

const pedido = docu.data();

div.innerHTML += `

<div class="card">

<h3>
🍽️ Mesa ${pedido.mesa}
</h3>

<div class="
status
${pedido.status==="pendente"
?"ocupada":"livre"}
">

${pedido.status.toUpperCase()}

</div>

<div style="margin-top:15px;">

${pedido.itens.map(i=>`
<div class="order-item">
${i.nome} x${i.quantidade}
</div>
`).join("")}

</div>

<div class="total">
R$ ${pedido.total.toFixed(2)}
</div>

<button class="btn-add"
style="width:100%;margin-top:10px;"
onclick="entregarPedido('${docu.id}','${pedido.mesa}')">
✅ Entregue
</button>

<button class="btn-primary"
style="margin-top:10px;"
onclick="imprimirNota('${docu.id}')">
🧾 Nota Fiscal
</button>

<button class="btn-remove"
style="width:100%;margin-top:10px;"
onclick="excluirPedido('${docu.id}')">
🗑️ Excluir
</button>

</div>

`;

});

});

}

window.entregarPedido =
async function(id,mesa){

await updateDoc(
doc(db,"pedidos",id),
{
status:"entregue"
}
);

await updateDoc(
doc(db,"mesas",mesa),
{
status:"livre"
}
);

alert("Mesa liberada!");

}

window.excluirPedido =
async function(id){

await deleteDoc(
doc(db,"pedidos",id)
);

}

/* NOTA */

window.imprimirNota =
function(id){

window.print();

}

/* QR */

window.gerarQRCodes =
async function(){

const qtd =
parseInt(
document.getElementById("quantidadeMesas")
.value
);

const div =
document.getElementById("qrGrid");

for(let i=1;i<=qtd;i++){

const mesaRef =
doc(db,"mesas",String(i));

const mesaSnap =
await getDoc(mesaRef);

if(!mesaSnap.exists()){

await setDoc(mesaRef,{
status:"livre"
});

}

}

carregarQRCodes();

}

async function carregarQRCodes(){

const div =
document.getElementById("qrGrid");

div.innerHTML = "";

const snap =
await getDocs(collection(db,"mesas"));

snap.forEach(docu=>{

const mesa = docu.id;
const dados = docu.data();

const qrId = "qr"+mesa;

div.innerHTML += `

<div class="qr-card">

<h3>
Mesa ${mesa}
</h3>

<div class="
status
${dados.status==="ocupada"
?"ocupada":"livre"}
">

${dados.status.toUpperCase()}

</div>

<div id="${qrId}"
class="qrcode"></div>

<button class="btn-remove"
style="width:100%;margin-top:10px;"
onclick="apagarQR('${mesa}')">
🗑️ Apagar QR
</button>

</div>

`;

const url =
location.origin+
location.pathname+
"?cliente=true&mesa="+mesa;

new QRCode(
document.getElementById(qrId),
{
text:url,
width:180,
height:180
}
);

});

}

window.apagarQR =
async function(mesa){

await deleteDoc(
doc(db,"mesas",mesa)
);

carregarQRCodes();

}

/* MESAS */

function carregarMesas(){

const select =
document.getElementById("mesaGarcom");

select.innerHTML = `
<option value="">
Selecione a mesa
</option>
`;

for(let i=1;i<=30;i++){

select.innerHTML += `
<option value="${i}">
Mesa ${i}
</option>
`;

}

}

/* MODO CLIENTE */

const params =
new URLSearchParams(location.search);

const cliente =
params.get("cliente");

if(cliente==="true"){

document.getElementById("tabsSistema")
.style.display="none";

document.querySelectorAll(".tab-content")
.forEach(t=>t.classList.remove("active"));

document.getElementById("cliente")
.classList.add("active");

const mesa =
params.get("mesa");

document.getElementById("mesaInfo")
.innerHTML = `
<div class="card">
Mesa ${mesa}
</div>
`;

}

/* INICIAR */

carregarProdutos();
carregarPedidos();
carregarMesas();
carregarQRCodes();

</script>

</body>
</html>
