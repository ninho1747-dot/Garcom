<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GarçomPro Firebase</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#0f172a;color:#fff;padding:20px;}
header{background:linear-gradient(135deg,#7c3aed,#2563eb);padding:20px;border-radius:20px;text-align:center;margin-bottom:20px;}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
button{border:none;padding:12px;border-radius:12px;cursor:pointer;font-weight:700;background:#2563eb;color:#fff;}
input,textarea,select{width:100%;padding:14px;border:none;border-radius:12px;background:#334155;color:#fff;margin-top:10px;}
.card{background:#1e293b;padding:20px;border-radius:20px;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:350px 1fr;gap:20px;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-top:20px;}
.item-card{background:#111827;border-radius:20px;overflow:hidden;}
.item-card img{width:100%;height:180px;object-fit:cover;}
.item-content{padding:15px;}
.price{color:#4ade80;font-weight:bold;margin:10px 0;}
.order-item{background:#334155;padding:10px;border-radius:12px;margin-top:10px;}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-top:20px;}
.qr-card{background:#111827;padding:20px;border-radius:20px;text-align:center;}
.qrcode{background:#fff;padding:10px;border-radius:12px;display:inline-block;margin-top:10px;}
.hidden{display:none;}
@media(max-width:900px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
<h1>🍽️ GarçomPro Firebase</h1>
</header>

<div class="tabs" id="tabs">
<button onclick="abrirAba('admin')">⚙️ Admin</button>
<button onclick="abrirAba('garcom')">🍽️ Garçom</button>
<button onclick="abrirAba('cliente')">📱 Cliente</button>
<button onclick="abrirAba('qr')">🔳 QR Code</button>
</div>

<div id="admin" class="aba">
<div class="grid">
<div class="card">
<h2>➕ Adicionar Produto</h2>
<input type="text" id="nome" placeholder="Nome">
<input type="number" id="preco" placeholder="Preço">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input type="file" id="imagem" accept="image/*">
<button onclick="adicionarProduto()">Salvar Produto</button>
</div>

<div class="card">
<h2>📦 Pedidos</h2>
<div id="pedidosAdmin"></div>
</div>
</div>
</div>

<div id="garcom" class="aba hidden">
<div class="card">
<h2>🍽️ Pedido Manual</h2>
<select id="mesaGarcom"></select>
<div class="menu-grid" id="menuGarcom"></div>
<div id="pedidoGarcom"></div>
<h2 id="totalGarcom">Total: R$ 0,00</h2>
<button onclick="enviarPedidoGarcom()">Enviar Pedido</button>
</div>
</div>

<div id="cliente" class="aba hidden">
<div class="card">
<h2>📱 Cardápio Digital</h2>
<select id="mesaCliente"></select>
<div id="statusMesas"></div>
<div class="menu-grid" id="menuCliente"></div>
<div id="pedidoCliente"></div>
<h2 id="totalCliente">Total: R$ 0,00</h2>
<button onclick="enviarPedidoCliente()">Enviar Pedido</button>
</div>
</div>

<div id="qr" class="aba hidden">
<div class="card">
<h2>🔳 QR Codes</h2>
<input type="number" id="quantidadeMesas" placeholder="Quantidade de mesas">
<button onclick="gerarQRCodes()">Gerar QR Codes</button>
<div class="qr-grid" id="qrGrid"></div>
</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig={apiKey:'AIzaSyBsam8XGNicS8vlpehCVlI-8_JBKyk_v2M',authDomain:'garcompro-bd3b3.firebaseapp.com',projectId:'garcompro-bd3b3',storageBucket:'garcompro-bd3b3.firebasestorage.app',messagingSenderId:'311775314838',appId:'1:311775314838:web:b4cafc21f9b8850811d3b7'};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let produtos=[];
let pedidoCliente=[];
let pedidoGarcom=[];

window.abrirAba=function(id){
document.querySelectorAll('.aba').forEach(a=>a.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
}

function carregarMesas(){
const selects=[document.getElementById('mesaCliente'),document.getElementById('mesaGarcom')];
selects.forEach(select=>{
select.innerHTML='<option value="">Selecionar Mesa</option>';
for(let i=1;i<=100;i++){
select.innerHTML+=`<option value="${i}">Mesa ${i}</option>`;
}
});
}

window.adicionarProduto=async function(){
const nome=document.getElementById('nome').value;
const preco=document.getElementById('preco').value;
const descricao=document.getElementById('descricao').value;
const arquivo=document.getElementById('imagem').files[0];
if(!nome||!preco||!arquivo){alert('Preencha tudo');return;}
const reader=new FileReader();
reader.onload=async function(e){
await addDoc(collection(db,'produtos'),{nome,preco:parseFloat(preco),descricao,imagem:e.target.result});
alert('Produto salvo');
carregarProdutos();
}
reader.readAsDataURL(arquivo);
}

async function carregarProdutos(){
produtos=[];
const snapshot=await getDocs(collection(db,'produtos'));
snapshot.forEach(docItem=>{produtos.push({id:docItem.id,...docItem.data()});});
renderizarMenus();
}

function renderizarMenus(){
const menuCliente=document.getElementById('menuCliente');
const menuGarcom=document.getElementById('menuGarcom');
menuCliente.innerHTML='';
menuGarcom.innerHTML='';

produtos.forEach(item=>{
const html=`
<div class="item-card">
<img src="${item.imagem}">
<div class="item-content">
<h3>${item.nome}</h3>
<div class="price">R$ ${item.preco.toFixed(2)}</div>
<p>${item.descricao}</p>
<button onclick="adicionarCliente('${item.id}')">Cliente</button>
<button onclick="adicionarGarcom('${item.id}')" style="margin-top:10px;">Garçom</button>
</div>
</div>`;
menuCliente.innerHTML+=html;
menuGarcom.innerHTML+=html;
});
}

window.adicionarCliente=function(id){
const item=produtos.find(p=>p.id===id);
const existe=pedidoCliente.find(p=>p.id===id);
if(existe){existe.qtd++;}else{pedidoCliente.push({...item,qtd:1});}
renderizarPedidoCliente();
}

window.adicionarGarcom=function(id){
const item=produtos.find(p=>p.id===id);
const existe=pedidoGarcom.find(p=>p.id===id);
if(existe){existe.qtd++;}else{pedidoGarcom.push({...item,qtd:1});}
renderizarPedidoGarcom();
}

function renderizarPedidoCliente(){
let html=''; let total=0;
pedidoCliente.forEach(item=>{
const subtotal=item.preco*item.qtd; total+=subtotal;
html+=`<div class='order-item'>${item.nome} x${item.qtd} - R$ ${subtotal.toFixed(2)}</div>`;
});
document.getElementById('pedidoCliente').innerHTML=html;
document.getElementById('totalCliente').innerHTML='Total: R$ '+total.toFixed(2);
}

function renderizarPedidoGarcom(){
let html=''; let total=0;
pedidoGarcom.forEach(item=>{
const subtotal=item.preco*item.qtd; total+=subtotal;
html+=`<div class='order-item'>${item.nome} x${item.qtd} - R$ ${subtotal.toFixed(2)}</div>`;
});
document.getElementById('pedidoGarcom').innerHTML=html;
document.getElementById('totalGarcom').innerHTML='Total: R$ '+total.toFixed(2);
}

window.enviarPedidoCliente=async function(){
const mesa=document.getElementById('mesaCliente').value;
if(!mesa||pedidoCliente.length===0){alert('Preencha tudo');return;}
let total=0;
pedidoCliente.forEach(i=>total+=i.preco*i.qtd);
await addDoc(collection(db,'pedidos'),{mesa,itens:pedidoCliente,total,status:'pendente'});
await setDoc(doc(db,'mesas','mesa'+mesa),{status:'ocupada'});
alert('Pedido enviado');
pedidoCliente=[];renderizarPedidoCliente();
}

window.enviarPedidoGarcom=async function(){
const mesa=document.getElementById('mesaGarcom').value;
if(!mesa||pedidoGarcom.length===0){alert('Preencha tudo');return;}
let total=0;
pedidoGarcom.forEach(i=>total+=i.preco*i.qtd);
await addDoc(collection(db,'pedidos'),{mesa,itens:pedidoGarcom,total,status:'pendente'});
await setDoc(doc(db,'mesas','mesa'+mesa),{status:'ocupada'});
alert('Pedido enviado');
pedidoGarcom=[];renderizarPedidoGarcom();
}

function carregarPedidos(){
onSnapshot(collection(db,'pedidos'),snapshot=>{
const div=document.getElementById('pedidosAdmin');
div.innerHTML='';
snapshot.forEach(docItem=>{
const pedido=docItem.data();
div.innerHTML+=`<div class='order-item'>
<h3>Mesa ${pedido.mesa}</h3>
<p>Status: ${pedido.status}</p>
<p>Total: R$ ${pedido.total.toFixed(2)}</p>
<button onclick="marcarEntregue('${docItem.id}','${pedido.mesa}')">Entregue</button>
<button onclick="excluirPedido('${docItem.id}')" style='margin-top:10px;background:#dc2626;'>Excluir</button>
</div>`;
});
});
}

window.marcarEntregue=async function(id,mesa){
await updateDoc(doc(db,'pedidos',id),{status:'entregue'});
await setDoc(doc(db,'mesas','mesa'+mesa),{status:'livre'});
alert('Mesa liberada');
}

window.excluirPedido=async function(id){
await deleteDoc(doc(db,'pedidos',id));
}

window.gerarQRCodes=async function(){
const quantidade=parseInt(document.getElementById('quantidadeMesas').value);
const grid=document.getElementById('qrGrid');
for(let i=1;i<=quantidade;i++){
if(document.getElementById('mesaQR'+i)) continue;
const div=document.createElement('div');
div.className='qr-card';
div.id='mesaQR'+i;
div.innerHTML=`<h3>Mesa ${i}</h3><div id='qr${i}' class='qrcode'></div>`;
grid.appendChild(div);
new QRCode(document.getElementById('qr'+i),{text:window.location.origin+window.location.pathname+'?cliente=true&mesa='+i,width:180,height:180});
}
}

const params=new URLSearchParams(window.location.search);
if(params.get('cliente')==='true'){
document.getElementById('tabs').style.display='none';
document.getElementById('admin').style.display='none';
document.getElementById('garcom').style.display='none';
document.getElementById('qr').style.display='none';
document.getElementById('cliente').classList.remove('hidden');
const mesa=params.get('mesa');
if(mesa){document.getElementById('mesaCliente').value=mesa;}
}

carregarMesas();
carregarProdutos();
carregarPedidos();
</script>
</body>
</html>
