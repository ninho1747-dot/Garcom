<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GarçomPro Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab-btn{
padding:14px 20px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
cursor:pointer;
font-weight:600;
}

.tab-btn.active{
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

input,
textarea,
select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#334155;
color:white;
}

button{
border:none;
padding:14px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:linear-gradient(135deg,#7c3aed,#2563eb);
color:white;
width:100%;
margin-top:10px;
}

.btn-remove{
background:#dc2626;
color:white;
}

.btn-add{
background:#16a34a;
color:white;
}

.btn-print{
background:#2563eb;
color:white;
}

.grid-menu{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.item{
background:#111827;
padding:15px;
border-radius:16px;
}

.item img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
}

.item h3{
margin-top:10px;
}

.price{
color:#4ade80;
font-weight:bold;
margin-top:5px;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.counter{
display:flex;
justify-content:center;
align-items:center;
background:#334155;
padding:10px;
border-radius:10px;
min-width:50px;
}

.order-item{
background:#334155;
padding:15px;
border-radius:12px;
margin-top:10px;
}

.total{
margin-top:20px;
font-size:24px;
font-weight:bold;
text-align:right;
color:#4ade80;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
margin-top:20px;
}

.qr-card{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
}

.qrcode{
background:white;
padding:10px;
border-radius:12px;
display:inline-block;
margin-top:10px;
}

.status{
display:inline-block;
padding:8px 14px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

.livre{
background:#16a34a;
}

.ocupada{
background:#dc2626;
}

@media(max-width:700px){

.grid-menu{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>
<body>

<header>
<h1>🍽️ GarçomPro Firebase</h1>
</header>

<div class="container">

<div class="tabs">

<button class="tab-btn active"
onclick="abrirAba('cliente',this)">
📱 Cliente
</button>

<button class="tab-btn"
onclick="abrirAba('garcom',this)">
🧾 Garçom
</button>

<button class="tab-btn"
onclick="abrirAba('admin',this)">
⚙️ Admin
</button>

<button class="tab-btn"
onclick="abrirAba('qr',this)">
🔳 QR Code
</button>

</div>

<!-- CLIENTE -->

<div id="cliente" class="tab-content active">

<div class="card">

<h2>📱 Cardápio</h2>

<div class="form-group">
<select id="mesaCliente">
<option value="">Selecione a mesa</option>
</select>
</div>

<div class="grid-menu" id="menuCliente"></div>

<h2 style="margin-top:30px;">
🛒 Pedido
</h2>

<div id="pedidoCliente"></div>

<div class="total" id="totalPedido">
Total: R$ 0,00
</div>

<button
class="btn-primary"
onclick="enviarPedido()">

📤 Enviar Pedido

</button>

</div>

</div>

<!-- GARÇOM -->

<div id="garcom" class="tab-content">

<div class="card">

<h2>🧾 Painel Garçom</h2>

<p>
O garçom pode usar o mesmo cardápio para adicionar pedidos manualmente.
</p>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="tab-content">

<div class="card">

<h2>⚙️ Administração</h2>

<div class="form-group">
<input type="text" id="nomeProduto" placeholder="Nome">
</div>

<div class="form-group">
<input type="number" id="precoProduto" placeholder="Preço">
</div>

<div class="form-group">
<select id="categoriaProduto">

<option value="Jantar">Jantar</option>
<option value="Bebidas">Bebidas</option>
<option value="Tira Gostos">Tira Gostos</option>

</select>
</div>

<div class="form-group">
<input type="file" id="imagemProduto">
</div>

<button
class="btn-primary"
onclick="adicionarProduto()">

➕ Adicionar Produto

</button>

</div>

</div>

<!-- QR -->

<div id="qr" class="tab-content">

<div class="card">

<h2>🔳 QR Codes</h2>

<div class="form-group">

<input
type="number"
id="quantidadeMesas"
placeholder="Quantidade de mesas">

</div>

<button
class="btn-primary"
onclick="gerarQRCodes()">

🔳 Criar QR Codes

</button>

<div class="qr-grid" id="qrGrid"></div>

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBsam8XGNicS8vlpehCVlI-8_JBKyk_v2M",
authDomain: "garcompro-bd3b3.firebaseapp.com",
projectId: "garcompro-bd3b3",
storageBucket: "garcompro-bd3b3.appspot.com",
messagingSenderId: "311775314838",
appId: "1:311775314838:web:b4cafc21f9b8850811d3b7"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.deleteDoc = deleteDoc;
window.doc = doc;
window.onSnapshot = onSnapshot;

</script>

<script>

let produtos = [];
let pedido = [];
let mesasStatus =
JSON.parse(localStorage.getItem("mesasStatus")) || {};

function abrirAba(id,botao){

document
.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document
.querySelectorAll(".tab-btn")
.forEach(btn=>{
btn.classList.remove("active");
});

document
.getElementById(id)
.classList.add("active");

botao.classList.add("active");

}

for(let i=1;i<=100;i++){

document
.getElementById("mesaCliente")
.innerHTML += `
<option value="${i}">
Mesa ${i}
</option>
`;

}

async function adicionarProduto(){

const nome =
document.getElementById("nomeProduto").value;

const preco =
document.getElementById("precoProduto").value;

const categoria =
document.getElementById("categoriaProduto").value;

const imagem =
document.getElementById("imagemProduto").files[0];

if(!nome || !preco || !imagem){

alert("Preencha tudo");
return;

}

const reader = new FileReader();

reader.onload = async function(e){

const produto = {
nome,
preco:parseFloat(preco),
categoria,
imagem:e.target.result
};

await addDoc(
collection(db,"produtos"),
produto
);

alert("Produto salvo!");

};

reader.readAsDataURL(imagem);

}

async function carregarProdutos(){

onSnapshot(
collection(db,"produtos"),
(snapshot)=>{

produtos = [];

snapshot.forEach(docItem=>{

produtos.push({
id:docItem.id,
...docItem.data()
});

});

renderizarMenu();

});

}

function renderizarMenu(){

const menu =
document.getElementById("menuCliente");

menu.innerHTML = "";

["Jantar","Bebidas","Tira Gostos"]
.forEach(categoria=>{

const titulo =
document.createElement("h2");

titulo.style.marginTop = "30px";

titulo.innerHTML = categoria;

menu.appendChild(titulo);

const grupo =
document.createElement("div");

grupo.className = "grid-menu";

produtos
.filter(p=>p.categoria===categoria)
.forEach(item=>{

grupo.innerHTML += `

<div class="item">

<img src="${item.imagem}">

<h3>${item.nome}</h3>

<div class="price">
R$ ${item.preco.toFixed(2)}
</div>

<div class="actions">

<button
class="btn-remove"
onclick="diminuir('${item.id}')">

-

</button>

<div
class="counter"
id="qtd-${item.id}">

0

</div>

<button
class="btn-add"
onclick="aumentar('${item.id}')">

+

</button>

</div>

</div>

`;

});

menu.appendChild(grupo);

});

}

function atualizarContador(id){

const item =
pedido.find(p=>p.id===id);

const contador =
document.getElementById("qtd-"+id);

if(contador){

contador.innerHTML = item ? item.qtd : 0;

}

}

window.aumentar = function(id){

const produto =
produtos.find(p=>p.id===id);

let item =
pedido.find(p=>p.id===id);

if(item){

item.qtd++;

}else{

pedido.push({
...produto,
qtd:1
});

}

atualizarContador(id);

renderizarPedido();

}

window.diminuir = function(id){

let item =
pedido.find(p=>p.id===id);

if(!item)return;

item.qtd--;

if(item.qtd<=0){

pedido =
pedido.filter(p=>p.id!==id);

}

atualizarContador(id);

renderizarPedido();

}

function renderizarPedido(){

const area =
document.getElementById("pedidoCliente");

area.innerHTML = "";

let total = 0;

pedido.forEach(item=>{

const subtotal =
item.preco * item.qtd;

total += subtotal;

area.innerHTML += `

<div class="order-item">

<div style="
display:flex;
justify-content:space-between;
">

<div>
${item.nome} x${item.qtd}
</div>

<div>
R$ ${subtotal.toFixed(2)}
</div>

</div>

</div>

`;

});

document.getElementById("totalPedido")
.innerHTML =
"Total: R$ " + total.toFixed(2);

}

window.enviarPedido = async function(){

const mesa =
document.getElementById("mesaCliente").value;

if(!mesa){

alert("Selecione a mesa");
return;

}

if(pedido.length===0){

alert("Adicione itens");
return;

}

await addDoc(
collection(db,"pedidos"),
{
mesa,
itens:pedido,
status:"pendente",
data:new Date().toLocaleString()
}
);

mesasStatus[mesa] = "ocupada";

localStorage.setItem(
"mesasStatus",
JSON.stringify(mesasStatus)
);

alert("Pedido enviado!");

pedido = [];

renderizarPedido();

}

window.gerarQRCodes = function(){

const quantidade =
parseInt(
document.getElementById("quantidadeMesas").value
);

if(!quantidade){

alert("Digite a quantidade");
return;

}

const grid =
document.getElementById("qrGrid");

for(let i=1;i<=quantidade;i++){

if(document.getElementById("mesaQR"+i)){
continue;
}

const status =
mesasStatus[i] || "livre";

const card =
document.createElement("div");

card.className = "qr-card";

card.id = "mesaQR"+i;

card.innerHTML = `

<h3>🍽️ Mesa ${i}</h3>

<div
id="qr${i}"
class="qrcode">
</div>

<div
id="status${i}"
class="status ${status}">

${status.toUpperCase()}

</div>

<button
class="btn-primary"
style="margin-top:10px;"
onclick="alternarMesa(${i})">

🔄 Livre/Ocupada

</button>

`;

grid.appendChild(card);

new QRCode(
document.getElementById("qr"+i),
{
text:
window.location.origin +
window.location.pathname +
"?cliente=true&mesa="+i,
width:180,
height:180
}
);

}

}

window.alternarMesa = function(numero){

mesasStatus[numero] =
mesasStatus[numero] === "ocupada"
? "livre"
: "ocupada";

localStorage.setItem(
"mesasStatus",
JSON.stringify(mesasStatus)
);

const status =
document.getElementById("status"+numero);

status.innerHTML =
mesasStatus[numero].toUpperCase();

status.className =
"status " + mesasStatus[numero];

}

const params =
new URLSearchParams(window.location.search);

if(params.get("cliente")==="true"){

document.querySelector(".tabs")
.style.display = "none";

document
.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document
.getElementById("cliente")
.classList.add("active");

}

carregarProdutos();

</script>

</body>
</html>
