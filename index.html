<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GarçomPro Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab-btn{
padding:14px 20px;
border:none;
border-radius:14px;
background:#1e293b;
color:#fff;
font-weight:600;
cursor:pointer;
}

.tab-btn.active{
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:20px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:8px;
}

input,
textarea,
select{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#334155;
color:white;
}

button{
border:none;
padding:14px;
border-radius:14px;
font-weight:600;
cursor:pointer;
}

.btn-primary{
background:linear-gradient(135deg,#7c3aed,#2563eb);
color:white;
width:100%;
}

.btn-cliente{
background:#16a34a;
color:white;
width:100%;
margin-top:10px;
}

.btn-remove{
background:#dc2626;
color:white;
}

.btn-add{
background:#2563eb;
color:white;
}

.btn-entregue{
background:#16a34a;
color:white;
width:100%;
margin-top:10px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.item-card{
background:#111827;
border-radius:18px;
overflow:hidden;
}

.item-card img{
width:100%;
height:120px;
object-fit:cover;
}

.item-content{
padding:12px;
}

.price{
font-size:18px;
font-weight:700;
color:#4ade80;
margin:8px 0;
}

.desc{
font-size:12px;
color:#cbd5e1;
}

.order-item{
background:#334155;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

.total{
font-size:24px;
font-weight:700;
margin-top:20px;
text-align:right;
color:#4ade80;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.qr-card{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
}

.qrcode{
background:white;
padding:10px;
border-radius:12px;
display:inline-block;
margin-top:10px;
}

.status{
padding:6px 12px;
border-radius:10px;
display:inline-block;
font-size:13px;
margin-top:10px;
font-weight:700;
}

.pendente{
background:#dc2626;
}

.entregue{
background:#16a34a;
}

.ocupada{
background:#dc2626;
padding:8px;
border-radius:10px;
margin-top:10px;
}

.livre{
background:#16a34a;
padding:8px;
border-radius:10px;
margin-top:10px;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>
<h1>🍽️ GarçomPro Firebase</h1>
</header>

<div class="container">

<div class="tabs">

<button class="tab-btn active"
onclick="abrirAba('garcom',this)">
🍽️ Garçom
</button>

<button class="tab-btn"
onclick="abrirAba('admin',this)">
⚙️ Admin
</button>

<button class="tab-btn"
onclick="abrirAba('cliente',this)">
📱 Cliente
</button>

<button class="tab-btn"
onclick="abrirAba('qr',this)">
🔳 QR Code
</button>

</div>

<!-- GARÇOM -->

<div id="garcom" class="tab-content active">

<div class="card">

<h2>🍽️ Pedido Manual do Garçom</h2>

<div class="form-group">
<label>Número da Mesa</label>
<select id="mesaGarcom"></select>
</div>

<div class="menu-grid" id="menuGarcom"></div>

<h2 style="margin-top:30px;">🛒 Pedido Atual</h2>

<div id="pedidoGarcom"></div>

<div class="total" id="totalGarcom">
Total: R$ 0,00
</div>

<button class="btn-primary"
onclick="enviarPedidoGarcom()">
📤 Enviar Pedido
</button>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="tab-content">

<div class="grid">

<div class="card">

<h2>➕ Adicionar Produto</h2>

<div class="form-group">
<label>Nome</label>
<input type="text" id="nome">
</div>

<div class="form-group">
<label>Preço</label>
<input type="number" id="preco">
</div>

<div class="form-group">
<label>Descrição</label>
<textarea id="descricao"></textarea>
</div>

<div class="form-group">
<label>Categoria</label>
<select id="categoria">
<option value="Bebidas">🍹 Bebidas</option>
<option value="Tira Gostos">🍟 Tira Gostos</option>
<option value="Jantar">🍛 Jantar</option>
</select>
</div>

<div class="form-group">
<label>Imagem</label>
<input type="file" id="imagem" accept="image/*">
</div>

<button class="btn-primary"
onclick="adicionarItem()">
➕ Adicionar Produto
</button>

</div>

<div class="card">

<h2>📦 Pedidos</h2>

<div id="listaPedidosAdmin"></div>

</div>

</div>

</div>

<!-- CLIENTE -->

<div id="cliente" class="tab-content">

<div class="card">

<h2>📱 Cardápio Digital</h2>

<div id="mesaClienteInfo"></div>

<div class="form-group">
<label>Selecionar Mesa</label>
<select id="mesaSelecionada"></select>
</div>

<div id="clienteMenu"></div>

<h2 style="margin-top:30px;">
🛒 Meu Pedido
</h2>

<div id="pedidoCliente"></div>

<div class="total" id="totalCliente">
Total: R$ 0,00
</div>

<button class="btn-primary"
onclick="enviarPedidoCliente()">
📤 Enviar Pedido
</button>

</div>

</div>

<!-- QR -->

<div id="qr" class="tab-content">

<div class="card">

<h2>🔳 QR Codes</h2>

<div class="form-group">
<label>Quantidade de Mesas</label>
<input type="number" id="quantidadeMesas">
</div>

<button class="btn-primary"
onclick="gerarQRCodes()">
Gerar QR Codes
</button>

<div class="qr-grid" id="qrGrid"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBsam8XGNicS8vlpehCVlI-8_JBKyk_v2M",
authDomain:"garcompro-bd3b3.firebaseapp.com",
projectId:"garcompro-bd3b3",
storageBucket:"garcompro-bd3b3.appspot.com",
messagingSenderId:"311775314838",
appId:"1:311775314838:web:b4cafc21f9b8850811d3b7"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cardapio = [];
let pedidoCliente = [];
let pedidoGarcom = [];
let mesas = {};

window.abrirAba = function(id,botao){

document.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document.querySelectorAll(".tab-btn")
.forEach(btn=>{
btn.classList.remove("active");
});

document.getElementById(id)
.classList.add("active");

botao.classList.add("active");

}

async function carregarProdutos(){

const snapshot =
await getDocs(collection(db,"produtos"));

cardapio = [];

snapshot.forEach(docItem=>{

cardapio.push({
firebaseId:docItem.id,
...docItem.data()
});

});

renderizarCliente();
renderizarGarcom();

}

window.adicionarItem = async function(){

const nome =
document.getElementById("nome").value;

const preco =
document.getElementById("preco").value;

const descricao =
document.getElementById("descricao").value;

const categoria =
document.getElementById("categoria").value;

const imagem =
document.getElementById("imagem").files[0];

if(!imagem){
alert("Selecione uma imagem");
return;
}

const reader = new FileReader();

reader.onload = async function(e){

await addDoc(collection(db,"produtos"),{

nome,
preco:parseFloat(preco),
descricao,
categoria,
imagem:e.target.result

});

alert("Produto adicionado!");

carregarProdutos();

};

reader.readAsDataURL(imagem);

}

function renderizarCliente(){

const clienteMenu =
document.getElementById("clienteMenu");

clienteMenu.innerHTML = "";

const categorias = [
"Bebidas",
"Tira Gostos",
"Jantar"
];

categorias.forEach(cat=>{

clienteMenu.innerHTML += `
<h2 style="margin-top:20px;">${cat}</h2>
<div class="menu-grid" id="cat-${cat}"></div>
`;

const area =
document.getElementById(`cat-${cat}`);

cardapio
.filter(item=>item.categoria===cat)
.forEach(item=>{

area.innerHTML += `
<div class="item-card">

<img src="${item.imagem}">

<div class="item-content">

<h3>${item.nome}</h3>

<div class="price">
R$ ${item.preco.toFixed(2)}
</div>

<div class="desc">
${item.descricao}
</div>

<button class="btn-cliente"
onclick="adicionarPedidoCliente('${item.firebaseId}')">
Adicionar
</button>

</div>

</div>
`;

});

});

}

window.adicionarPedidoCliente = function(id){

const item =
cardapio.find(i=>i.firebaseId===id);

const existente =
pedidoCliente.find(i=>i.firebaseId===id);

if(existente){

existente.quantidade++;

}else{

pedidoCliente.push({
...item,
quantidade:1
});

}

renderizarPedidoCliente();

}

function renderizarPedidoCliente(){

const pedidoDiv =
document.getElementById("pedidoCliente");

pedidoDiv.innerHTML = "";

let total = 0;

pedidoCliente.forEach((item,index)=>{

const subtotal =
item.preco * item.quantidade;

total += subtotal;

pedidoDiv.innerHTML += `

<div class="order-item">

<div style="
display:flex;
justify-content:space-between;
margin-bottom:10px;
">

<div>
<strong>${item.nome}</strong>
</div>

<div>
R$ ${subtotal.toFixed(2)}
</div>

</div>

<div style="
display:flex;
gap:10px;
">

<button class="btn-remove"
onclick="diminuirQuantidade(${index})">
➖
</button>

<div style="
flex:1;
text-align:center;
padding:10px;
background:#1e293b;
border-radius:10px;
">
${item.quantidade}
</div>

<button class="btn-add"
onclick="aumentarQuantidade(${index})">
➕
</button>

<button class="btn-remove"
onclick="removerItemCliente(${index})">
🗑️
</button>

</div>

</div>

`;

});

document.getElementById("totalCliente")
.innerHTML =
"Total: R$ " + total.toFixed(2);

}

window.aumentarQuantidade = function(index){

pedidoCliente[index].quantidade++;

renderizarPedidoCliente();

}

window.diminuirQuantidade = function(index){

if(pedidoCliente[index].quantidade > 1){

pedidoCliente[index].quantidade--;

}else{

pedidoCliente.splice(index,1);

}

renderizarPedidoCliente();

}

window.removerItemCliente = function(index){

pedidoCliente.splice(index,1);

renderizarPedidoCliente();

}

function carregarMesas(){

const selects = [
document.getElementById("mesaSelecionada"),
document.getElementById("mesaGarcom")
];

selects.forEach(select=>{

select.innerHTML = "";

for(let i=1;i<=50;i++){

select.innerHTML += `
<option value="${i}">
Mesa ${i}
</option>
`;

}

});

}

window.enviarPedidoCliente = async function(){

const mesa =
document.getElementById("mesaSelecionada").value;

let total = 0;

pedidoCliente.forEach(item=>{
total += item.preco * item.quantidade;
});

await addDoc(collection(db,"pedidos"),{

mesa,
itens:pedidoCliente,
total,
status:"pendente"

});

pedidoCliente = [];

renderizarPedidoCliente();

alert("Pedido enviado!");

}

window.gerarQRCodes = function(){

const quantidade =
parseInt(
document.getElementById("quantidadeMesas").value
);

const qrGrid =
document.getElementById("qrGrid");

for(let i=1;i<=quantidade;i++){

if(document.getElementById("qrMesa"+i)){
continue;
}

const div = document.createElement("div");

div.className = "qr-card";

div.innerHTML = `

<h3>Mesa ${i}</h3>

<div id="qrMesa${i}" class="qrcode"></div>

`;

qrGrid.appendChild(div);

new QRCode(
document.getElementById("qrMesa"+i),
{
text:
window.location.origin +
window.location.pathname +
"?cliente=true&mesa=" + i,
width:180,
height:180
}
);

}

}

/* MODO CLIENTE */

const params =
new URLSearchParams(window.location.search);

const modoCliente =
params.get("cliente");

const mesaQR =
params.get("mesa");

if(modoCliente==="true"){

document.querySelector(".tabs")
.style.display="none";

document.getElementById("admin")
.style.display="none";

document.getElementById("garcom")
.style.display="none";

document.getElementById("qr")
.style.display="none";

document.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document.getElementById("cliente")
.style.display="block";

document.getElementById("cliente")
.classList.add("active");

document.querySelector("header h1")
.innerHTML="📱 Cardápio Digital";

if(mesaQR){

document.getElementById("mesaSelecionada")
.value = mesaQR;

document.getElementById("mesaClienteInfo")
.innerHTML =
"🍽️ Mesa " + mesaQR;

}

}

carregarProdutos();
carregarMesas();

</script>

</body>
</html>
