<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GarçomPro Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab-btn{
padding:14px 20px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
font-weight:600;
cursor:pointer;
}

.tab-btn.active{
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input,
select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#334155;
color:white;
margin-bottom:10px;
}

button{
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:linear-gradient(135deg,#7c3aed,#2563eb);
color:white;
width:100%;
}

.btn-add{
background:#16a34a;
color:white;
}

.btn-remove{
background:#dc2626;
color:white;
}

.btn-print{
background:#2563eb;
color:white;
}

.grid-menu{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
margin-top:20px;
}

.item{
background:#111827;
padding:10px;
border-radius:14px;
}

.item img{
width:100%;
height:110px;
object-fit:cover;
border-radius:10px;
}

.item h3{
font-size:15px;
margin-top:8px;
}

.price{
font-size:14px;
color:#4ade80;
font-weight:bold;
margin-top:4px;
}

.actions{
display:flex;
gap:6px;
margin-top:8px;
}

.counter{
min-width:40px;
padding:8px;
font-size:14px;
background:#334155;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
}

.order-item{
background:#334155;
padding:12px;
border-radius:12px;
margin-top:10px;
}

.total{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:right;
color:#4ade80;
}

.pedido-cozinha{
background:#111827;
padding:15px;
border-radius:14px;
margin-top:15px;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:20px;
margin-top:20px;
}

.qr-card{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
}

.qrcode{
background:white;
padding:10px;
border-radius:12px;
display:inline-block;
margin-top:10px;
}

.status{
padding:8px 14px;
border-radius:10px;
font-weight:bold;
display:inline-block;
margin-top:10px;
}

.pendente{
background:#dc2626;
}

.entregue{
background:#16a34a;
}

</style>

</head>

<body>

<header>

<h1>🍽️ GarçomPro Firebase</h1>

</header>

<div class="container">

<div class="tabs">

<button class="tab-btn active"
onclick="abrirAba('cliente',this)">
📱 Cliente
</button>

<button class="tab-btn"
onclick="abrirAba('cozinha',this)">
👨‍🍳 Cozinha
</button>

<button class="tab-btn"
onclick="abrirAba('admin',this)">
⚙️ Admin
</button>

<button class="tab-btn"
onclick="abrirAba('qr',this)">
🔳 QR CODE
</button>

</div>

<!-- CLIENTE -->

<div id="cliente" class="tab-content active">

<div class="card">

<h2>📱 Cardápio</h2>

<select id="mesaCliente">

<option value="">
Selecione a mesa
</option>

</select>

<div id="menuCliente"></div>

<h2 style="margin-top:30px;">
🛒 Meu Pedido
</h2>

<div id="pedidoCliente"></div>

<div class="total" id="totalPedido">
Total: R$ 0,00
</div>

<button class="btn-primary"
onclick="enviarPedido()">
📤 Enviar Pedido
</button>

</div>

</div>

<!-- COZINHA -->

<div id="cozinha" class="tab-content">

<div class="card">

<h2>👨‍🍳 Pedidos</h2>

<div id="listaPedidos"></div>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="tab-content">

<div class="card">

<h2>⚙️ Administração</h2>

<input type="text"
id="nomeProduto"
placeholder="Nome do produto">

<input type="number"
id="precoProduto"
placeholder="Preço">

<select id="categoriaProduto">

<option value="Jantar">
Jantar
</option>

<option value="Bebidas">
Bebidas
</option>

<option value="Tira Gostos">
Tira Gostos
</option>

</select>

<input type="file"
id="imagemProduto">

<button class="btn-primary"
onclick="adicionarProduto()">
➕ Adicionar Produto
</button>

<div id="listaAdminProdutos"></div>

</div>

</div>

<!-- QR -->

<div id="qr" class="tab-content">

<div class="card">

<h2>🔳 Gerador QR CODE</h2>

<input type="number"
id="quantidadeMesas"
placeholder="Quantidade de mesas">

<button class="btn-primary"
onclick="gerarQRCodes()">
🔳 Criar QR CODES
</button>

<div class="qr-grid"
id="qrGrid"></div>

</div>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBsam8XGNicS8vlpehCVlI-8_JBKyk_v2M",

authDomain:
"garcompro-bd3b3.firebaseapp.com",

projectId:
"garcompro-bd3b3",

storageBucket:
"garcompro-bd3b3.appspot.com",

messagingSenderId:
"311775314838",

appId:
"1:311775314838:web:b4cafc21f9b8850811d3b7"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* VARIÁVEIS */

let produtos = [];
let pedido = [];

/* ABAS */

window.abrirAba = function(id,btn){

document.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document.querySelectorAll(".tab-btn")
.forEach(b=>{
b.classList.remove("active");
});

document.getElementById(id)
.classList.add("active");

btn.classList.add("active");

}

/* MESAS */

for(let i=1;i<=100;i++){

document.getElementById("mesaCliente")
.innerHTML += `
<option value="${i}">
Mesa ${i}
</option>
`;

}

/* PRODUTOS */

window.adicionarProduto =
async function(){

const nome =
document.getElementById("nomeProduto").value;

const preco =
document.getElementById("precoProduto").value;

const categoria =
document.getElementById("categoriaProduto").value;

const imagemInput =
document.getElementById("imagemProduto");

if(!nome || !preco){

alert("Preencha os campos");
return;

}

if(!imagemInput.files[0]){

alert("Escolha uma imagem");
return;

}

const reader =
new FileReader();

reader.onload =
async function(e){

await addDoc(
collection(db,"produtos"),
{
nome,
preco:Number(preco),
categoria,
imagem:e.target.result
}
);

alert("Produto salvo!");

}

reader.readAsDataURL(
imagemInput.files[0]
);

}

/* CARREGAR PRODUTOS */

function carregarProdutos(){

onSnapshot(
collection(db,"produtos"),
(snapshot)=>{

produtos = [];

snapshot.forEach((docItem)=>{

produtos.push({
id:docItem.id,
...docItem.data()
});

});

renderizarMenu();
renderizarAdmin();

});

}

/* MENU */

function renderizarMenu(){

const menu =
document.getElementById("menuCliente");

menu.innerHTML = "";

["Jantar","Bebidas","Tira Gostos"]
.forEach((categoria)=>{

menu.innerHTML += `
<h2 style="margin-top:30px;">
${categoria}
</h2>
`;

menu.innerHTML += `
<div class="grid-menu">

${produtos
.filter(p=>p.categoria===categoria)
.map(item=>`

<div class="item">

<img src="${item.imagem}">

<h3>${item.nome}</h3>

<div class="price">
R$ ${item.preco.toFixed(2)}
</div>

<div class="actions">

<button
class="btn-remove"
onclick="diminuir('${item.id}')">
-
</button>

<div
class="counter"
id="qtd-${item.id}">
0
</div>

<button
class="btn-add"
onclick="aumentar('${item.id}')">
+
</button>

</div>

</div>

`).join("")}

</div>
`;

});

}

/* PEDIDO */

window.aumentar = function(id){

const produto =
produtos.find(p=>p.id===id);

const item =
pedido.find(p=>p.id===id);

if(item){

item.qtd++;

}else{

pedido.push({
...produto,
qtd:1
});

}

atualizarPedido();

}

window.diminuir = function(id){

const item =
pedido.find(p=>p.id===id);

if(!item)return;

item.qtd--;

if(item.qtd<=0){

pedido =
pedido.filter(p=>p.id!==id);

}

atualizarPedido();

}

function atualizarPedido(){

const area =
document.getElementById("pedidoCliente");

area.innerHTML = "";

let total = 0;

produtos.forEach((produto)=>{

const contador =
document.getElementById(
"qtd-"+produto.id
);

if(contador){

const item =
pedido.find(p=>p.id===produto.id);

contador.innerHTML =
item ? item.qtd : 0;

}

});

pedido.forEach((item)=>{

const subtotal =
item.preco * item.qtd;

total += subtotal;

area.innerHTML += `

<div class="order-item">

<div style="
display:flex;
justify-content:space-between;
">

<div>
${item.nome} x${item.qtd}
</div>

<div>
R$ ${subtotal.toFixed(2)}
</div>

</div>

</div>

`;

});

document.getElementById("totalPedido")
.innerHTML =
"Total: R$ " + total.toFixed(2);

}

/* ENVIAR PEDIDO */

window.enviarPedido =
async function(){

const mesa =
document.getElementById("mesaCliente").value;

if(!mesa){

alert("Selecione a mesa");
return;

}

if(pedido.length===0){

alert("Adicione itens");
return;

}

let total = 0;

pedido.forEach(item=>{
total += item.preco * item.qtd;
});

await addDoc(
collection(db,"pedidos"),
{
mesa,
itens:pedido,
total,
status:"pendente",
data:new Date().toLocaleString()
}
);

alert("Pedido enviado!");

pedido = [];

atualizarPedido();

}

/* PEDIDOS */

function carregarPedidos(){

onSnapshot(
collection(db,"pedidos"),
(snapshot)=>{

const area =
document.getElementById("listaPedidos");

area.innerHTML = "";

snapshot.forEach((docItem)=>{

const pedido = docItem.data();

let itensHTML = "";

pedido.itens.forEach((item)=>{

itensHTML += `

<div class="order-item">

<div style="
display:flex;
justify-content:space-between;
">

<div>
${item.nome} x${item.qtd}
</div>

<div>
R$ ${(item.preco * item.qtd).toFixed(2)}
</div>

</div>

</div>

`;

});

area.innerHTML += `

<div class="pedido-cozinha">

<h3>
🍽️ Mesa ${pedido.mesa}
</h3>

${itensHTML}

<div class="total">
R$ ${pedido.total.toFixed(2)}
</div>

<div class="
status ${pedido.status}
">

${pedido.status.toUpperCase()}

</div>

<div style="
display:flex;
flex-direction:column;
gap:10px;
margin-top:15px;
">

<button
class="btn-primary"
onclick="marcarEntregue('${docItem.id}')">
✅ Entregue
</button>

<button
class="btn-print"
onclick="imprimirNotaFiscal('${docItem.id}')">
🧾 Nota Fiscal
</button>

<button
class="btn-remove"
onclick="excluirPedido('${docItem.id}')">
🗑️ Excluir
</button>

</div>

</div>

`;

});

});

}

window.marcarEntregue =
async function(id){

await updateDoc(
doc(db,"pedidos",id),
{
status:"entregue"
}
);

}

window.excluirPedido =
async function(id){

if(confirm("Excluir pedido?")){

await deleteDoc(
doc(db,"pedidos",id)
);

}

}

/* NOTA */

window.imprimirNotaFiscal =
async function(id){

const snapshot =
await getDocs(collection(db,"pedidos"));

let pedido = null;

snapshot.forEach((docItem)=>{

if(docItem.id===id){

pedido = docItem.data();

}

});

if(!pedido)return;

let itens = "";

pedido.itens.forEach((item)=>{

itens += `

<tr>

<td>${item.nome}</td>

<td>${item.qtd}</td>

<td>
R$ ${(item.preco * item.qtd).toFixed(2)}
</td>

</tr>

`;

});

const win =
window.open("","","width=350,height=700");

win.document.write(`

<html>

<head>

<title>Nota Fiscal</title>

<style>

body{
font-family:monospace;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td{
border-bottom:1px dashed #000;
padding:5px 0;
font-size:12px;
}

.total{
margin-top:10px;
font-size:18px;
font-weight:bold;
text-align:right;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:black;
color:white;
border:none;
}

@media print{
button{
display:none;
}
}

</style>

</head>

<body>

<h2 style="text-align:center;">
GARÇOM PRO
</h2>

<p style="text-align:center;">
CUPOM NÃO FISCAL
</p>

<hr>

<p>Mesa ${pedido.mesa}</p>

<p>${pedido.data}</p>

<table>

${itens}

</table>

<div class="total">

TOTAL:
R$ ${pedido.total.toFixed(2)}

</div>

<button onclick="window.print()">

🖨️ Imprimir

</button>

</body>

</html>

`);

win.document.close();

}

/* ADMIN */

function renderizarAdmin(){

const area =
document.getElementById("listaAdminProdutos");

area.innerHTML = "";

produtos.forEach((item)=>{

area.innerHTML += `

<div class="order-item">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">

<div>
${item.nome}
</div>

<button
class="btn-remove"
onclick="excluirProduto('${item.id}')">
🗑️
</button>

</div>

</div>

`;

});

}

window.excluirProduto =
async function(id){

if(confirm("Excluir produto?")){

await deleteDoc(
doc(db,"produtos",id)
);

}

}

/* QR CODE */

window.gerarQRCodes =
function(){

const qtd =
parseInt(
document.getElementById("quantidadeMesas").value
);

if(!qtd){

alert("Digite a quantidade");
return;

}

const grid =
document.getElementById("qrGrid");

for(let i=1;i<=qtd;i++){

if(document.getElementById("qrMesa"+i)){
continue;
}

const div =
document.createElement("div");

div.className = "qr-card";

div.id = "qrMesa"+i;

div.innerHTML = `

<h3>🍽️ Mesa ${i}</h3>

<div
id="qrcode${i}"
class="qrcode">
</div>

<div style="
display:flex;
flex-direction:column;
gap:10px;
margin-top:15px;
">

<button
class="btn-print"
onclick="baixarQRCode(${i})">

⬇️ Baixar QR CODE

</button>

</div>

`;

grid.appendChild(div);

new QRCode(
document.getElementById("qrcode"+i),
{
text:
window.location.origin +
window.location.pathname +
"?cliente=true&mesa="+i,
width:180,
height:180
}
);

}

}

/* BAIXAR QR */

window.baixarQRCode =
function(numero){

const canvas =
document.querySelector(
"#qrcode"+numero+" canvas"
);

if(!canvas){

alert("QR CODE não encontrado");
return;

}

const link =
document.createElement("a");

link.download =
"mesa-"+numero+".png";

link.href =
canvas.toDataURL("image/png");

link.click();

}

/* MODO CLIENTE */

const params =
new URLSearchParams(window.location.search);

if(params.get("cliente")==="true"){

document.querySelector(".tabs")
.style.display = "none";

document.querySelectorAll(".tab-content")
.forEach(tab=>{
tab.classList.remove("active");
});

document.getElementById("cliente")
.classList.add("active");

}

/* INICIAR */

carregarProdutos();
carregarPedidos();

</script>

</body>
</html>
